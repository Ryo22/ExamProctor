<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>接続確認システム</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e8f0;
      --muted: #64748b;
      --red: #ef4444;
      --blue: #3b82f6;
      --green: #22c55e;
      --orange: #f97316;
    }
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: var(--bg); color: var(--text);
      overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center;
    }

    #viewport { text-align: center; max-width: 440px; width: 90%; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 2.5rem; position: relative; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

    /* Entry Screen */
    #entry-screen h1 { font-size: 1.5rem; font-weight: 900; margin-bottom: 2rem; color: var(--blue); }
    .input-grp { text-align: left; margin-bottom: 1.5rem; }
    .input-grp label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; font-weight: bold; }
    input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: white; font-size: 1rem; transition: 0.2s; }
    input:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 10px rgba(59,130,246,0.2); }

    /* Login Screen */
    #login-screen h1 { font-size: 1.4rem; font-weight: 900; margin-bottom: 0.4rem; color: var(--blue); }
    .login-meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.8rem; }
    .login-meta b { color: var(--text); }
    .offline-guide {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 14px;
      padding: 1.2rem 1.4rem;
      text-align: left;
      margin-bottom: 1.6rem;
    }
    .offline-guide h3 { font-size: 0.9rem; color: var(--red); margin-bottom: 0.8rem; display: flex; align-items: center; gap: 6px; }
    .offline-guide ul { list-style: none; padding: 0; }
    .offline-guide li { font-size: 0.85rem; color: var(--text); padding: 4px 0; display: flex; align-items: center; gap: 8px; }
    .offline-guide li::before { content: '→'; color: var(--red); font-weight: 900; }

    /* Status Screen */
    #state-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    #state-label { font-size: 1.8rem; font-weight: 900; margin-bottom: 1rem; }
    #state-desc { font-size: 0.95rem; color: var(--muted); line-height: 1.6; }

    /* Alert State */
    .alert-active { border-color: var(--red); box-shadow: 0 0 40px rgba(239, 68, 68, 0.3); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0); } }

    .btn { background: var(--blue); border: none; color: white; padding: 16px 24px; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 1rem; width: 100%; transition: 0.22s; box-shadow: 0 4px 15px rgba(59,130,246,0.3); font-size: 1rem; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59,130,246,0.5); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-red { background: var(--red); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
    .btn-start { background: var(--green); box-shadow: 0 4px 15px rgba(34,197,94,0.3); }
    .btn-start:hover { box-shadow: 0 6px 20px rgba(34,197,94,0.5); }

    .meta-info { position: fixed; bottom: 20px; left: 0; right: 0; font-size: 0.7rem; color: var(--muted); opacity: 0.6; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div id="viewport">
    <!-- ① 入力画面 -->
    <div id="entry-screen" class="card">
        <h1>🔍 受験登録</h1>
        <div class="input-grp">
            <label>試験セッション名</label>
            <input type="text" id="input-topic" placeholder="例: Finance">
        </div>
        <div class="input-grp">
            <label>学籍番号</label>
            <input type="text" id="input-sid" placeholder="学籍番号を入力してください">
        </div>
        <button class="btn" id="login-btn" onclick="handleLogin()">システムにログインする</button>
        <p id="entry-error" style="color:var(--red); font-size:0.75rem; margin-top:1rem; min-height:1.2rem;"></p>
    </div>

    <!-- ② ログイン後・監視開始前の案内画面 -->
    <div id="login-screen" class="card hidden">
        <h1>🔒 システムログイン済み</h1>
        <p class="login-meta">
            試験: <b id="login-topic-disp">---</b> &nbsp;|&nbsp; 学籍番号: <b id="login-sid-disp">---</b>
        </p>

        <div class="offline-guide">
            <h3>⚠️ 監視開始前に必ずオフラインにしてください</h3>
            <ul>
                <li>Wi-Fi をオフにする</li>
                <li>LAN ケーブルを抜く</li>
                <li>機内モードを有効にする（スマートフォン等）</li>
            </ul>
        </div>

        <button class="btn btn-start" onclick="startProctoring()">監視を開始する</button>
    </div>

    <!-- ③ 監視中画面 -->
    <div id="main-screen" class="card hidden">
        <div id="state-icon">🛡️</div>
        <div id="state-label">確認中...</div>
        <div id="state-desc">ネットワーク接続をチェックしています...</div>
        <button id="dismiss-btn" class="btn btn-red" style="display:none;" onclick="onDismiss()">了解しました（切断済み）</button>
        <button id="end-btn" class="btn" style="background:var(--muted); margin-top:0.5rem;" onclick="onEnd()">試験を終了する</button>
    </div>
</div>

<div id="meta-container" class="meta-info hidden">
    SESSION: <span id="meta-session">---</span> | ID: <span id="meta-sid">---</span>
</div>

<script type="module" src="/src/client.js"></script>
</body>
</html>
