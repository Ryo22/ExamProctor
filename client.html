<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>接続確認システム</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e8f0;
      --muted: #64748b;
      --red: #ef4444;
      --blue: #3b82f6;
      --green: #22c55e;
      --orange: #f97316;
    }
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: var(--bg); color: var(--text);
      overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center;
    }

    #viewport { text-align: center; max-width: 440px; width: 90%; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 2.5rem; position: relative; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

    /* Entry Screen */
    #entry-screen h1 { font-size: 1.5rem; font-weight: 900; margin-bottom: 2rem; color: var(--blue); }
    .input-grp { text-align: left; margin-bottom: 1.5rem; }
    .input-grp label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; font-weight: bold; }
    input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: white; font-size: 1rem; transition: 0.2s; }
    input:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 10px rgba(59,130,246,0.2); }

    /* Login Screen */
    #login-screen h1 { font-size: 1.4rem; font-weight: 900; margin-bottom: 0.4rem; color: var(--blue); }
    .login-meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.8rem; }
    .login-meta b { color: var(--text); }
    .offline-guide {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 14px;
      padding: 1.2rem 1.4rem;
      text-align: left;
      margin-bottom: 1.6rem;
    }
    .offline-guide h3 { font-size: 0.9rem; color: var(--red); margin-bottom: 0.8rem; display: flex; align-items: center; gap: 6px; }
    .offline-guide ul { list-style: none; padding: 0; }
    .offline-guide li { font-size: 0.85rem; color: var(--text); padding: 4px 0; display: flex; align-items: center; gap: 8px; }
    .offline-guide li::before { content: '→'; color: var(--red); font-weight: 900; }

    /* Status Screen */
    #state-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    #state-label { font-size: 1.8rem; font-weight: 900; margin-bottom: 1rem; }
    #state-desc { font-size: 0.95rem; color: var(--muted); line-height: 1.6; }

    /* Alert State */
    .alert-active { border-color: var(--red); box-shadow: 0 0 40px rgba(239, 68, 68, 0.3); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0); } }

    .btn { background: var(--blue); border: none; color: white; padding: 16px 24px; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 1rem; width: 100%; transition: 0.22s; box-shadow: 0 4px 15px rgba(59,130,246,0.3); font-size: 1rem; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59,130,246,0.5); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-red { background: var(--red); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
    .btn-start { background: var(--green); box-shadow: 0 4px 15px rgba(34,197,94,0.3); }
    .btn-start:hover { box-shadow: 0 6px 20px rgba(34,197,94,0.5); }

    .meta-info { position: fixed; bottom: 20px; left: 0; right: 0; font-size: 0.7rem; color: var(--muted); opacity: 0.6; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div id="viewport">
    <!-- ① 入力画面 -->
    <div id="entry-screen" class="card">
        <h1>🔍 受験登録</h1>
        <div class="input-grp">
            <label>試験セッション名</label>
            <input type="text" id="input-topic" placeholder="例: Finance">
        </div>
        <div class="input-grp">
            <label>学籍番号</label>
            <input type="text" id="input-sid" placeholder="学籍番号を入力してください">
        </div>
        <button class="btn" id="login-btn" onclick="handleLogin()">システムにログインする</button>
        <p id="entry-error" style="color:var(--red); font-size:0.75rem; margin-top:1rem; min-height:1.2rem;"></p>
    </div>

    <!-- ② ログイン後・監視開始前の案内画面 -->
    <div id="login-screen" class="card hidden">
        <h1>🔒 システムログイン済み</h1>
        <p class="login-meta">
            試験: <b id="login-topic-disp">---</b> &nbsp;|&nbsp; 学籍番号: <b id="login-sid-disp">---</b>
        </p>

        <div class="offline-guide">
            <h3>⚠️ 監視開始前に必ずオフラインにしてください</h3>
            <ul>
                <li>Wi-Fi をオフにする</li>
                <li>LAN ケーブルを抜く</li>
                <li>機内モードを有効にする（スマートフォン等）</li>
            </ul>
        </div>

        <button class="btn btn-start" onclick="startProctoring()">監視を開始する</button>
    </div>

    <!-- ③ 監視中画面 -->
    <div id="main-screen" class="card hidden">
        <div id="state-icon">🛡️</div>
        <div id="state-label">確認中...</div>
        <div id="state-desc">ネットワーク接続をチェックしています...</div>
        <button id="dismiss-btn" class="btn btn-red" style="display:none;" onclick="onDismiss()">了解しました（切断済み）</button>
        <button id="end-btn" class="btn" style="background:var(--muted); margin-top:0.5rem;" onclick="onEnd()">試験を終了する</button>
    </div>
</div>

<div id="meta-container" class="meta-info hidden">
    SESSION: <span id="meta-session">---</span> | ID: <span id="meta-sid">---</span>
</div>

<script>
    let TOPIC = "", SID = "";
    let monitoringActive = false;
    let isOnline = false;
    let isChecking = false;
    let firstTick = true;
    let currentStatus = 'OFFLINE';
    let alertCount = 0;
    let lastSyncedStatus = null;

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const topicParam = params.get('topic');
        const sidParam = params.get('sid');
        if (topicParam) document.getElementById('input-topic').value = topicParam;
        if (sidParam) document.getElementById('input-sid').value = sidParam;
    };

    // サーバー経由でステータスを送信（Supabase には直接アクセスしない）
    async function syncStatus(status, count) {
        try {
            const res = await fetch('/api/sync', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    topic_id: TOPIC,
                    sid: SID,
                    status,
                    alert_count: count ?? alertCount,
                    last_seen: new Date().toISOString()
                })
            });
            if (res.ok) { lastSyncedStatus = status; return true; }
            console.error('syncStatus API error:', res.status);
            return false;
        } catch(e) {
            console.error('syncStatus error:', e);
            return false;
        }
    }

    // ① ログインボタン: 入力確認 → LOGIN ステータスを送信 → 案内画面へ
    async function handleLogin() {
        const topic = document.getElementById('input-topic').value.trim();
        const sid   = document.getElementById('input-sid').value.trim();
        const errEl = document.getElementById('entry-error');
        const btn   = document.getElementById('login-btn');

        errEl.textContent = '';
        if (!topic || !sid) {
            errEl.textContent = 'セッション名と学籍番号を入力してください。';
            return;
        }

        TOPIC = topic;
        SID   = sid;

        btn.textContent = 'ログイン中...';
        btn.disabled = true;

        // LOGIN ステータスを Supabase へ送信
        const ok = await syncStatus('LOGIN', 0);

        btn.textContent = 'システムにログインする';
        btn.disabled = false;

        if (!ok) {
            errEl.textContent = 'ネットワークエラー。接続を確認して再試行してください。';
            return;
        }

        // 案内画面へ
        document.getElementById('login-topic-disp').textContent = TOPIC;
        document.getElementById('login-sid-disp').textContent   = SID;
        document.getElementById('entry-screen').classList.add('hidden');
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('meta-container').classList.remove('hidden');
        document.getElementById('meta-session').textContent = TOPIC;
        document.getElementById('meta-sid').textContent     = SID;
    }

    // ② 監視開始ボタン: 案内画面 → 監視画面
    function startProctoring() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        monitoringActive = true;
        updateUI('CHECKING');
        setInterval(tick, 1000);
    }

    // メインループ: 接続確認 → 状態更新 → 同期
    async function tick() {
        if (isChecking) return;
        if (!monitoringActive && lastSyncedStatus === 'FINISHED') return;
        isChecking = true;

        let online = false;
        try {
            const ctrl = new AbortController();
            setTimeout(() => ctrl.abort(), 3000);
            await fetch('https://www.gstatic.com/generate_204', {
                method: 'GET', mode: 'no-cors', cache: 'no-store', signal: ctrl.signal
            });
            online = true;
        } catch(e) { online = false; }

        const wasOnline = isOnline;
        isOnline = online;

        if (monitoringActive && currentStatus !== 'FINISHED') {
            if (firstTick) {
                firstTick = false;
                if (online) {
                    currentStatus = 'ALERT';
                    alertCount++;
                    updateUI('ALERT');
                } else {
                    currentStatus = 'SAFE';
                    updateUI('SAFE');
                }
            } else if (!wasOnline && online) {
                await syncStatus('SAFE');
                await new Promise(r => setTimeout(r, 500));
                currentStatus = 'ALERT';
                alertCount++;
                updateUI('ALERT');
            } else if (wasOnline && !online) {
                currentStatus = 'SAFE';
                updateUI('SAFE');
            } else if (online && currentStatus === 'SAFE') {
                currentStatus = 'ALERT';
                alertCount++;
                updateUI('ALERT');
            }
        }

        if (online && currentStatus !== lastSyncedStatus) {
            await syncStatus(currentStatus);
        }

        isChecking = false;
    }

    function updateUI(status) {
        const card  = document.getElementById('main-screen');
        const icon  = document.getElementById('state-icon');
        const label = document.getElementById('state-label');
        const desc  = document.getElementById('state-desc');
        const btn   = document.getElementById('dismiss-btn');

        if (status === 'CHECKING') {
            card.className = 'card';
            icon.textContent = '🔍';
            label.textContent = '確認中...';
            label.style.color = 'var(--muted)';
            desc.textContent = 'ネットワーク接続をチェックしています...';
            btn.style.display = 'none';
        } else if (status === 'SAFE') {
            card.className = 'card';
            icon.textContent = '✅';
            label.textContent = 'オフライン確認';
            label.style.color = 'var(--green)';
            desc.textContent = 'ネットワーク未接続を確認しました。そのまま試験を続けてください。';
            btn.style.display = 'none';
        } else if (status === 'ALERT') {
            card.className = 'card alert-active';
            icon.textContent = '⚠️';
            label.textContent = 'ネット接続検知';
            label.style.color = 'var(--red)';
            desc.textContent = '直ちに Wi-Fi をオフにするか、LANケーブルを抜いてください！';
            btn.style.display = 'block';
        } else if (status === 'ENDED') {
            card.className = 'card';
            icon.textContent = '✅';
            label.textContent = '試験終了';
            label.style.color = 'var(--muted)';
            desc.textContent = 'お疲れ様でした。このページを閉じてください。';
            btn.style.display = 'none';
            document.getElementById('end-btn').style.display = 'none';
        }
    }

    function onDismiss() {
        currentStatus = 'SAFE';
        updateUI('SAFE');
        if (isOnline) {
            (async () => { await syncStatus('SAFE'); })();
        }
    }

    function onEnd() {
        if (!confirm('試験を終了しますか？\n終了後は監視が停止されます。')) return;
        monitoringActive = false;
        currentStatus = 'FINISHED';
        updateUI('ENDED');
    }
</script>
</body>
</html>
