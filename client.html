<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>接続確認システム</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e8f0;
      --muted: #64748b;
      --red: #ef4444;
      --blue: #3b82f6;
      --green: #22c55e;
    }
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: var(--bg); color: var(--text);
      overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center;
    }

    #viewport { text-align: center; max-width: 420px; width: 90%; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 2.5rem; position: relative; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

    /* Entry Screen */
    #entry-screen h1 { font-size: 1.5rem; font-weight: 900; margin-bottom: 2rem; color: var(--blue); }
    .input-grp { text-align: left; margin-bottom: 1.5rem; }
    .input-grp label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; font-weight: bold; }
    input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: white; font-size: 1rem; transition: 0.2s; }
    input:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 10px rgba(59,130,246,0.2); }

    /* Status Screen */
    #state-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    #state-label { font-size: 1.8rem; font-weight: 900; margin-bottom: 1rem; }
    #state-desc { font-size: 0.95rem; color: var(--muted); line-height: 1.6; }

    /* Alert State */
    .alert-active { border-color: var(--red); box-shadow: 0 0 40px rgba(239, 68, 68, 0.3); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0); } }

    .btn { background: var(--blue); border: none; color: white; padding: 16px 24px; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 1rem; width: 100%; transition: 0.22s; box-shadow: 0 4px 15px rgba(59,130,246,0.3); font-size: 1rem; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59,130,246,0.5); }
    .btn-red { background: var(--red); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }

    .meta-info { position: fixed; bottom: 20px; left: 0; right: 0; font-size: 0.7rem; color: var(--muted); opacity: 0.6; }
    
    .hidden { display: none; }
  </style>
</head>
<body>

<div id="viewport">
    <!-- 1. Entry Screen -->
    <div id="entry-screen" class="card">
        <h1>🔍 受験登録</h1>
        <div class="input-grp">
            <label>試験セッション名</label>
            <input type="text" id="input-topic" placeholder="例: Math-Test-01">
        </div>
        <div class="input-grp">
            <label>学籍番号</label>
            <input type="text" id="input-sid" placeholder="例: 2024001">
        </div>
        <button class="btn" onclick="startProctoring()">試験監視を開始する</button>
        <p id="entry-error" style="color:var(--red); font-size:0.75rem; margin-top:1rem; min-height:1.2rem;"></p>
    </div>

    <!-- 2. Main Monitoring Screen -->
    <div id="main-screen" class="card hidden">
        <div id="state-icon">🛡️</div>
        <div id="state-label">監視中</div>
        <div id="state-desc">ネットワーク接続は確認されていません。そのまま試験を続けてください。</div>
        <button id="dismiss-btn" class="btn btn-red" style="display:none;" onclick="onDismiss()">了解しました（切断済み）</button>
    </div>
</div>

<div id="meta-container" class="meta-info hidden">
    SESSION: <span id="meta-session">---</span> | ID: <span id="meta-sid">---</span>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    let TOPIC = params.get('topic');
    let SID = params.get('sid');
    const NTFY_BASE = 'https://ntfy.sh';

    if (TOPIC) document.getElementById('input-topic').value = TOPIC;
    if (SID) document.getElementById('input-sid').value = SID;

    let isAlert = false;
    let monitoringActive = false;

    // --- 【修正部分】送信キューとリトライロジック ---
    let eventQueue =[];
    let isSending = false;

    // 即座にfetchせず、一旦キューに保存する
    function sendEvent(type) {
        if (!TOPIC || !SID) return;
        eventQueue.push(`${type}:${SID}`);
        processQueue(); // 送信を試みる
    }

    // キューの内容を順次送信する（通信が通るまでリトライする）
    async function processQueue() {
        // 送信中、キューが空、またはブラウザがオフライン認識の場合は中断
        if (isSending || eventQueue.length === 0 || !navigator.onLine) return;
        isSending = true;

        while (eventQueue.length > 0) {
            const payload = eventQueue[0];
            try {
                const response = await fetch(`${NTFY_BASE}/${TOPIC}`, {
                    method: 'POST',
                    body: payload,
                    headers: { 'Title': 'Exam Security Notification' }
                });
                
                if (response.ok) {
                    // 送信に成功したらキューから削除
                    eventQueue.shift();
                } else {
                    // サーバーエラーの場合は一旦ループを抜けて次回再試行
                    break;
                }
            } catch (e) {
                // 通信確立前の Network Error はここでキャッチされる
                // キューに残したままループを抜け、数秒後に自動リトライする
                console.warn('通信未確立のためリトライ待機中...', e);
                break;
            }
            // 連続送信を避けるためのわずかなインターバル
            await new Promise(r => setTimeout(r, 500));
        }
        
        isSending = false;
    }
    // ------------------------------------------------

    function startProctoring() {
        TOPIC = document.getElementById('input-topic').value.trim();
        SID = document.getElementById('input-sid').value.trim();

        if (!TOPIC || !SID) {
            document.getElementById('entry-error').textContent = 'セッション名と学籍番号を入力してください。';
            return;
        }

        // UI切り替え
        document.getElementById('entry-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        document.getElementById('meta-container').classList.remove('hidden');
        document.getElementById('meta-session').textContent = TOPIC;
        document.getElementById('meta-sid').textContent = SID;

        monitoringActive = true;
        updateUI('MONITORING');
        sendEvent('REGISTER');
        
        // 監視のインターバル
        setInterval(checkConnection, 3000);
        // 【追加】定期的に未送信キューの処理を試みる（通信復帰時にまとめて送るため）
        setInterval(processQueue, 3000);
    }

    function updateUI(status) {
        const card = document.getElementById('main-screen');
        const icon = document.getElementById('state-icon');
        const label = document.getElementById('state-label');
        const desc = document.getElementById('state-desc');
        const btn = document.getElementById('dismiss-btn');

        if (status === 'MONITORING') {
            card.className = 'card';
            icon.textContent = '🛡️';
            label.textContent = '監視中';
            label.style.color = 'var(--green)';
            desc.textContent = 'ネットワーク接続は確認されていません。そのまま試験を続けてください。';
            btn.style.display = 'none';
        } else if (status === 'ALERT') {
            card.className = 'card alert-active';
            icon.textContent = '⚠️';
            label.textContent = '接続検知';
            label.style.color = 'var(--red)';
            desc.textContent = 'ネットワーク接続を検知しました。直ちにWi-Fiを切断、またはLANケーブルを抜いてください。';
            btn.style.display = 'block';
        }
    }

    function checkConnection() {
        if (!monitoringActive) return;
        
        if (navigator.onLine) {
            if (!isAlert) {
                isAlert = true;
                sendEvent('ALERT'); // ここでキューに入る
                updateUI('ALERT');
            }
        } else {
            // オフライン時は何もしない（アラート状態なら了解待ち）
        }
    }

    function onDismiss() {
        isAlert = false;
        sendEvent('DISMISS');
        updateUI('MONITORING');
    }

    // フォーカス監視
    window.onblur = () => { if(monitoringActive) sendEvent('FOCUS_LOST'); };
    window.onfocus = () => { if(monitoringActive) sendEvent('FOCUS_GAINED'); };
</script>
</body>
</html>
