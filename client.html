<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>接続監視システム | 受験者</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --green:   #22c55e;
      --red:     #ef4444;
      --blue:    #3b82f6;
    }
    body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; }

    /* Login Card */
    #screen-input { align-items: center; justify-content: center; padding: 1.5rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 440px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
    .form-group { text-align: left; margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 0.5rem; }
    .form-group input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; font-size: 1.1rem; text-align: center; font-weight: 600; }

    .btn { border: none; cursor: pointer; border-radius: 10px; font-weight: 800; transition: all 0.2s; font-family: inherit; }
    .btn:active { transform: scale(0.97); }
    .btn-green { width: 100%; background: var(--green); color: #000; padding: 14px; font-size: 1.1rem; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; font-size: 0.8rem; }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }

    /* Monitor */
    .mon-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .mon-body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 2rem; }
    .status-ring { width: 160px; height: 160px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 4rem; border: 4px solid transparent; transition: all 0.4s; margin-bottom: 1.5rem; }
    .status-ring.safe { background: #052e16; border-color: var(--green); box-shadow: 0 0 30px rgba(34,197,94,0.15); }
    .status-ring.alert { background: #450a0a; border-color: var(--red); animation: pulse-ring 1s infinite; }
    .status-ring.idle { background: var(--surface); border-color: var(--border); }
    @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); } 70% { box-shadow: 0 0 0 20px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }

    .status-label { font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; }
    .status-label.safe { color: var(--green); }
    .status-label.alert { color: var(--red); }
    .status-sub { color: var(--muted); font-size: 0.9rem; }

    /* Finished */
    #screen-finished { align-items: center; justify-content: center; background: radial-gradient(circle, #1e293b, #0f172a); }
    .finish-icon { font-size: 6rem; margin-bottom: 1rem; }

    /* Floating Lamp - EXTREME Z-INDEX */
    #status-lamp { position: fixed; top: 15px; right: 15px; z-index: 1000000; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); padding: 8px 16px; border-radius: 30px; border: 1px solid var(--border); pointer-events: none; }
    .lamp-dot { width: 12px; height: 12px; border-radius: 50%; background: #444; }
    .lamp-dot.safe { background: var(--green); box-shadow: 0 0 10px var(--green); }
    .lamp-dot.alert { background: var(--red); animation: pulse-red 1s infinite; }
    @keyframes pulse-red { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .lamp-text { font-size: 0.7rem; font-weight: 800; color: white; }

    /* Alert Modal - EXTREME Z-INDEX */
    #alert-overlay { display: none; position: fixed; inset: 0; z-index: 1000001; align-items: center; justify-content: center; background: rgba(0,0,0,0.75); backdrop-filter: blur(5px); }
    .alert-modal { background: var(--surface); border: 2px solid var(--red); border-radius:24px; padding: 2.5rem; width: 90%; max-width: 420px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.6); }
    .ov-title { font-size: 1.5rem; font-weight: 900; color: var(--red); margin-top: 1rem; }
    .ov-msg { font-size: 0.9rem; margin: 1.5rem 0; line-height: 1.6; }
  </style>
</head>
<body>

<div id="status-lamp" style="display:none;">
  <div class="lamp-dot" id="lamp-dot"></div>
  <div class="lamp-text" id="lamp-text">STANDBY</div>
</div>

<div id="screen-input" class="screen active">
  <div class="card">
    <div style="font-size: 3rem; margin-bottom: 1rem;">🔒</div>
    <h1>接続監視システム</h1>
    <p style="color:var(--muted); font-size:0.85rem; margin-bottom:2rem;">名簿に登録されている「学籍番号」を入力してください</p>
    <div class="form-group" id="topic-container">
      <label>セッションコード</label>
      <input type="text" id="topic-input" placeholder="exam-xxxx" />
    </div>
    <div id="topic-badge" style="display:none; background:var(--bg); padding:10px; border-radius:8px; margin-bottom:1.5rem; font-size:0.8rem;">
      セッション: <b id="topic-badge-val"></b>
    </div>
    <div class="form-group">
      <label>学籍番号</label>
      <input type="text" id="student-id-input" placeholder="2024001" />
    </div>
    <button class="btn btn-green" onclick="beginMonitoring()">監視を開始する</button>
    <div id="input-error" style="color:var(--red); font-size:0.8rem; margin-top:10px;"></div>
  </div>
</div>

<div id="screen-monitor" class="screen">
  <div class="mon-header">
    <div style="display:flex; align-items:center; gap:10px;">
      <span style="font-weight:900;" id="mon-sid">--</span>
      <span style="font-size:0.6rem; color:var(--muted); background:var(--bg); padding:2px 6px; border-radius:4px;" id="mon-topic">--</span>
    </div>
    <button class="btn btn-ghost" onclick="copySessionUrl()">🔗 URLコピー</button>
  </div>
  <div class="mon-body">
    <div class="status-ring idle" id="status-ring">🔒</div>
    <div class="status-label idle" id="status-label">確認中</div>
    <div class="status-sub" id="status-sub">インターネットを切断して試験を開始してください</div>
    <div id="last-check" style="margin-top:2rem; font-size:0.7rem; color:var(--muted);">最終確認: --</div>
    <div id="alert-hist" style="display:none; margin-top:1rem; color:var(--red); font-size:0.8rem; font-weight:700;">
        ⚠️ 接続を検知済み（<span id="alert-count-disp">0</span>回）
    </div>
  </div>
</div>

<div id="screen-finished" class="screen">
  <div class="finish-icon">🎊</div>
  <h1 style="font-size: 2rem; color: var(--green); margin-bottom:1rem;">試験終了</h1>
  <p style="text-align:center; line-height:1.6; padding:0 2rem;">
    お疲れ様でした。監視を終了します。<br>
    <span style="color:var(--muted); font-size:0.8rem; font-style:italic;">Exam finished. Well done!</span><br><br>
    ブラウザを閉じて、監督者の指示に従ってください。
  </p>
  <button class="btn btn-ghost" style="margin-top:2.5rem; padding:10px 40px;" onclick="location.reload()">ホームに戻る</button>
</div>

<div id="alert-overlay">
  <div class="alert-modal">
    <div style="font-size: 4rem;">⚠️</div>
    <div class="ov-title">接続を検知しました</div>
    <p class="ov-msg">
      直ちにネットワークを遮断してください！<br>
      <span style="color:var(--muted); font-size:0.8rem;">Disconnect internet immediately!</span>
    </p>
    <div style="background:var(--bg); padding:15px; border-radius:12px; margin-bottom:2rem; font-size:0.85rem; text-align:left;">
      検知時刻: <b id="ov-time">--</b><br>
      学籍番号: <b id="ov-sid">--</b><br>
      累計回数: <b id="ov-count">--</b>
    </div>
    <button class="btn btn-blue" onclick="dismissAlert()">OK / 確認しました</button>
  </div>
</div>

<script>
  const NTFY_BASE = 'https://ntfy.sh';
  const CHECK_INTERVAL = 5000;
  const CONNECT_CHECK_URL = 'https://www.google.com/favicon.ico';

  let topic = '';
  let studentId = '';
  let monitorTimer = null;
  let alertCount = 0;
  let isAlertActive = false;
  let lastMessageId = 'all';

  // URL引き継ぎ
  const q = new URLSearchParams(location.search);
  const tParam = q.get('topic');
  if (tParam) {
    document.getElementById('topic-input').value = tParam;
    document.getElementById('topic-container').style.display = 'none';
    document.getElementById('topic-badge').style.display = 'block';
    document.getElementById('topic-badge-val').textContent = tParam;
  }

  function beginMonitoring() {
    const tVal = document.getElementById('topic-input').value.trim();
    const sVal = document.getElementById('student-id-input').value.trim();
    if (!tVal || !sVal) { document.getElementById('input-error').textContent = '入力を確認してください'; return; }
    
    topic = tVal;
    studentId = sVal;
    document.getElementById('mon-sid').textContent = studentId;
    document.getElementById('mon-topic').textContent = topic;
    document.getElementById('ov-sid').textContent = studentId;
    document.getElementById('status-lamp').style.display = 'flex';
    
    switchScreen('screen-monitor');
    sendEvent('REGISTER', '監視開始');
    
    checkConnection();
    monitorTimer = setInterval(checkConnection, CHECK_INTERVAL);
  }

  async function checkConnection() {
    let online = false;
    try {
      await fetch(CONNECT_CHECK_URL + '?t=' + Date.now(), { mode:'no-cors', cache:'no-store', signal:AbortSignal.timeout(4000) });
      online = true;
    } catch(e) { online = false; }

    if (online) {
      onInternetDetected();
      pollAdmin(); // オンライン時のみ指示確認
    } else {
      onOffline();
    }
    document.getElementById('last-check').textContent = '最終確認: ' + new Date().toLocaleTimeString();
  }

  async function pollAdmin() {
    try {
      const resp = await fetch(`${NTFY_BASE}/${topic}/json?poll=1&since=${lastMessageId}`);
      if (!resp.ok) return;
      const text = await resp.text();
      text.trim().split('\n').filter(Boolean).forEach(line => {
        const msg = JSON.parse(line);
        if (msg.event === 'message') {
          lastMessageId = msg.id;
          if (msg.message === 'FINISH:ALL:END') finishExam();
        }
      });
    } catch(e) {}
  }

  function onInternetDetected() {
    if (isAlertActive) return;
    isAlertActive = true;
    alertCount++;
    sendEvent('ALERT', '接続検知');
    updateUI('alert', '⚠️', '接続検知！', 'すみやかに切断してください');
    document.getElementById('alert-hist').style.display = 'block';
    document.getElementById('alert-count-disp').textContent = alertCount;
    document.getElementById('ov-time').textContent = new Date().toLocaleTimeString();
    document.getElementById('ov-count').textContent = alertCount;
    document.getElementById('alert-overlay').style.display = 'flex';
  }

  function onOffline() {
    if (isAlertActive) return;
    updateUI('safe', '✅', '安全', 'オフラインを確認。試験に集中してください');
  }

  function dismissAlert() {
    isAlertActive = false;
    document.getElementById('alert-overlay').style.display = 'none';
    sendEvent('DISMISS', '了解');
    updateUI('safe', '✅', '安全', 'オフラインを確認。試験に集中してください');
  }

  function finishExam() {
    clearInterval(monitorTimer);
    document.getElementById('status-lamp').style.display = 'none';
    switchScreen('screen-finished');
  }

  function sendEvent(type, note) {
    const body = `${type}:${studentId}:${note}`;
    fetch(`${NTFY_BASE}/${topic}`, { method:'POST', body:body }).catch(()=>{});
  }

  function updateUI(type, icon, label, sub) {
    const ring = document.getElementById('status-ring');
    const lbl = document.getElementById('status-label');
    const ldot = document.getElementById('lamp-dot');
    const ltxt = document.getElementById('lamp-text');

    ring.className = 'status-ring ' + type;
    ring.textContent = icon;
    lbl.className = 'status-label ' + type;
    lbl.textContent = label;
    document.getElementById('status-sub').textContent = sub;
    
    ldot.className = 'lamp-dot ' + type;
    ltxt.textContent = (type==='alert') ? '⚠️ ネットワークを切断してください' : 'ONLINE (SAFE)';
  }

  function switchScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function copySessionUrl() {
    const u = new URL(location.href);
    u.searchParams.set('topic', topic);
    navigator.clipboard.writeText(u.toString()).then(()=>alert('URLをコピーしました'));
  }
</script>
</body>
</html>
