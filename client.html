<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>接続確認システム</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e8f0;
      --muted: #64748b;
      --red: #ef4444;
      --blue: #3b82f6;
    }
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: var(--bg); color: var(--text);
      overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center;
    }

    #viewport { text-align: center; max-width: 480px; width: 90%; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; position: relative; overflow: hidden; }

    #state-icon { font-size: 3rem; margin-bottom: 1rem; }
    #state-label { font-size: 1.5rem; font-weight: 900; margin-bottom: 0.5rem; }
    #state-desc { font-size: 0.9rem; color: var(--muted); line-height: 1.6; }

    /* Alert State */
    .alert-active { border-color: var(--red); box-shadow: 0 0 30px rgba(239, 68, 68, 0.2); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0); } }

    .btn { background: var(--border); border: none; color: white; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 2rem; width: 100%; transition: 0.2s; }
    .btn:hover { background: var(--muted); }

    .meta-info { position: fixed; bottom: 20px; left: 0; right: 0; font-size: 0.75rem; color: var(--muted); opacity: 0.5; }
  </style>
</head>
<body>

<div id="viewport">
    <div id="main-card" class="card">
        <div id="state-icon">📡</div>
        <div id="state-label">準備中</div>
        <div id="state-desc">試験セッションの読み込み中...</div>
        <button id="dismiss-btn" class="btn" style="display:none;" onclick="onDismiss()">了解しました</button>
    </div>
</div>

<div class="meta-info">
    SESSION: <span id="meta-session">---</span> | ID: <span id="meta-sid">---</span>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const TOPIC = params.get('topic');
    const SID = params.get('sid') || 'USER-' + Math.floor(Math.random() * 1000);
    const NTFY_BASE = 'https://ntfy.sh';

    document.getElementById('meta-session').textContent = TOPIC || 'UNDEFINED';
    document.getElementById('meta-sid').textContent = SID;

    let isAlert = false;

    async function sendEvent(type) {
        if (!TOPIC) return;
        try {
            await fetch(`${NTFY_BASE}/${TOPIC}`, {
                method: 'POST',
                body: `${type}:${SID}`,
                headers: { 'Title': 'Exam Security Notification' }
            });
        } catch (e) { console.error(e); }
    }

    function updateUI(status) {
        const card = document.getElementById('main-card');
        const icon = document.getElementById('state-icon');
        const label = document.getElementById('state-label');
        const desc = document.getElementById('state-desc');
        const btn = document.getElementById('dismiss-btn');

        if (status === 'MONITORING') {
            card.className = 'card';
            icon.textContent = '🛡️';
            label.textContent = '監視中';
            label.style.color = 'var(--blue)';
            desc.textContent = 'ネットワーク接続が継続されています。このまま試験を続けてください。';
            btn.style.display = 'none';
        } else if (status === 'ALERT') {
            card.className = 'card alert-active';
            icon.textContent = '⚠️';
            label.textContent = '接続を検知しました';
            label.style.color = 'var(--red)';
            desc.textContent = '直ちにネットワークを切断してください。';
            btn.style.display = 'block';
        }
    }

    function checkConnection() {
        if (navigator.onLine) {
            if (!isAlert) {
                isAlert = true;
                sendEvent('ALERT');
                updateUI('ALERT');
            }
        } else {
            if (isAlert) {
                // 自動で解除はせず、了解ボタンを待つ運用の場合
            } else {
                updateUI('MONITORING');
            }
        }
    }

    function onDismiss() {
        isAlert = false;
        sendEvent('DISMISS');
        updateUI('MONITORING');
    }

    // 監視開始
    if (!TOPIC) {
        document.getElementById('state-label').textContent = '⚠️ エラー';
        document.getElementById('state-desc').textContent = '試験用セッションコード（Topic）が指定されていません。正しいURLからアクセスしてください。';
    } else {
        updateUI('MONITORING');
        sendEvent('REGISTER');
        setInterval(checkConnection, 3000);
        
        // ページを離れようとした場合
        window.onblur = () => sendEvent('FOCUS_LOST');
        window.onfocus = () => sendEvent('FOCUS_GAINED');
    }
</script>
</body>
</html>
