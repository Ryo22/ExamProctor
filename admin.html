<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>接続監視システム | 統合管理ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --green:   #22c55e;
      --red:     #ef4444;
      --blue:    #3b82f6;
      --orange:  #f97316;
      --indigo:  #6366f1;
    }
    body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; }

    /* Login */
    #screen-login { align-items: center; justify-content: center; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px; text-align: center; }

    /* Common Components */
    .btn { border: none; cursor: pointer; border-radius: 8px; font-weight: 700; transition: all 0.2s; font-family: inherit; }
    .btn:active { transform: scale(0.96); }
    .btn-blue  { background: var(--blue); color: #fff; padding: 12px; width: 100%; }
    .btn-green { background: var(--green); color: #000; padding: 12px; width: 100%; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; font-size: 0.75rem; }
    .btn-red   { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: var(--red); padding: 5px 10px; font-size: 0.75rem; }

    .form-group { text-align: left; margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.7rem; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
    .form-group input, .form-group textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; font-size: 1rem; }

    /* Setup */
    #screen-setup { align-items: center; padding: 3rem 1.5rem; }
    .setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 100%; max-width: 700px; }
    .topic-list { display: flex; flex-direction: column; gap: 10px; margin: 1.5rem 0; }
    .topic-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; display: flex; align-items: center; justify-content: space-between; }
    .topic-url { font-size: 0.65rem; color: var(--blue); margin-top: 4px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px; }

    /* Dash */
    .dash-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
    .stats-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; gap: 1.5rem; overflow-x: auto; }
    .stat { display: flex; flex-direction: column; min-width: 80px; }
    .stat-n { font-size: 1.5rem; font-weight: 800; }
    .stat-l { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; }

    .dash-main { display: grid; grid-template-columns: 1fr 340px; gap: 1.5rem; padding: 1.5rem; max-width: 1400px; margin: 0 auto; width:100%; }
    .card-v { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .card-v h2 { font-size: 0.85rem; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }
    
    #chart-container { height: 240px; }
    .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { background: var(--bg); color: var(--muted); font-size: 0.65rem; text-align: left; padding: 10px 15px; border-bottom: 1px solid var(--border); }
    td { padding: 10px 15px; border-bottom: 1px solid var(--border); }
    tr.row-alert { background: rgba(239, 68, 68, 0.05); }
    tr.row-absent { opacity: 0.5; }

    .status-pill { padding: 3px 10px; border-radius: 999px; font-size: 0.73rem; font-weight: 700; }
    .status-pill.alert { background: var(--red); color: white; }
    .status-pill.safe  { background: rgba(34,197,94,0.15); color: var(--green); }
    .status-pill.absent { background: var(--bg); color: var(--muted); }
    .status-pill.unregistered { background: #451a03; color: #fbbf24; }

    .alert-scroll { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; }
    .alert-card { background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 10px; padding: 12px; }

    #log-box { font-size: 0.7rem; color: var(--muted); max-height: 250px; overflow-y: auto; }
    #toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
    .toast { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--red); padding: 15px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); min-width: 250px; }

    @media (max-width: 1000px) { .dash-main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div id="screen-login" class="screen active">
  <div class="login-card">
    <div style="font-size: 3rem; margin-bottom: 1rem;">🔐</div>
    <h1>統合管理パネル</h1>
    <div class="form-group">
      <label>ADMIN PASSWORD</label>
      <input type="password" id="pw-input" placeholder="パスワードを入力" />
    </div>
    <div id="pw-error" style="color:var(--red); font-size:0.8rem; margin-bottom:1rem;"></div>
    <button class="btn btn-blue" onclick="checkPassword()">認証する</button>
  </div>
</div>

<div id="screen-setup" class="screen">
  <div class="setup-card">
    <h2>📋 試験セッション管理</h2>
    <div class="topic-list" id="topic-list-ui"></div>
    <div style="display: flex; gap: 10px;">
      <input type="text" id="new-topic-input" placeholder="セッションコード" style="flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:10px; border-radius:8px;" />
      <button class="btn btn-blue" style="width:auto; padding:0 20px;" onclick="addTopic()">追加</button>
    </div>
    <div class="form-group" style="margin-top:2rem;">
      <label>共通受験者名簿（CSV: 学籍番号,氏名）</label>
      <textarea id="setup-roster" style="height:120px;" placeholder="2024001,田中太郎..."></textarea>
    </div>
    <button class="btn btn-green" onclick="startDashboard()">🎥 ダッシュボード起動</button>
    <div id="setup-error" style="color:var(--red); font-size:0.8rem; margin-top:10px;"></div>
  </div>
</div>

<div id="screen-dash" class="screen">
  <div class="dash-header">
    <div style="display:flex; align-items:center; gap:10px;">
        <span style="font-size:1.5rem;">🛡️</span>
        <h1>統合監視パネル</h1>
        <span style="background:var(--indigo); font-size:0.6rem; padding:2px 6px; border-radius:4px;">LIVE</span>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-ghost" onclick="switchScreen('screen-setup')">⚙️ 設定</button>
        <button class="btn btn-ghost" onclick="location.reload()">再起動</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat"><span class="stat-n" id="stat-exams">0</span><span class="stat-l">試験数</span></div>
    <div class="stat"><span class="stat-n" id="stat-total">0</span><span class="stat-l">総受験者</span></div>
    <div class="stat" style="color:var(--green);"><span class="stat-n" id="stat-safe">0</span><span class="stat-l">正常</span></div>
    <div class="stat" style="color:var(--red);"><span class="stat-n" id="stat-alert">0</span><span class="stat-l">警告</span></div>
    <div class="stat" style="color:var(--orange);"><span class="stat-n" id="stat-absent">0</span><span class="stat-l">未参加</span></div>
    <div class="stat" style="margin-left:auto;">
      <span class="stat-n" style="font-size:0.75rem; color:var(--muted);" id="last-poll-time">--</span>
      <span class="stat-l">最終更新</span>
    </div>
  </div>

  <div class="dash-main">
    <div class="dash-left">
      <div class="card-v">
        <h2>📊 検知トレンド</h2>
        <div id="chart-container"><canvas id="alertChart"></canvas></div>
      </div>
      <div class="card-v">
        <h2>👥 受験者詳細</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>試験</th><th>番号</th><th>氏名</th><th>状態</th><th>検知</th><th>最終</th><th>操作</th></tr>
            </thead>
            <tbody id="main-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="dash-right">
      <div class="card-v">
        <h2>🚨 アラート</h2>
        <div class="alert-scroll" id="active-alerts-list"></div>
      </div>
      <div class="card-v">
        <h2>📝 ログ</h2>
        <div id="log-box"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast-wrap"></div>

<script>
  const ADMIN_PASSWORD = 'admin';
  const NTFY_BASE      = 'https://ntfy.sh';
  const POLL_INTERVAL  = 3000;

  let activeTopics    = [];
  let rosterData      = {};
  let lastMessageIds  = {};
  let studentStates   = {};
  let finishedTopics  = new Set();
  let alertChart      = null;
  let chartData       = { labels: [], datasets: [{ label: '検知数', data: [], borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', fill: true, tension: 0.4 }] };

  function checkPassword() {
    if (document.getElementById('pw-input').value === ADMIN_PASSWORD) switchScreen('screen-setup');
    else document.getElementById('pw-error').textContent = '認証失敗';
  }

  function addTopic() {
    const topic = document.getElementById('new-topic-input').value.trim();
    if (topic && !activeTopics.includes(topic)) {
        activeTopics.push(topic);
        document.getElementById('new-topic-input').value = '';
        renderTopicList();
    }
  }

  function removeTopic(t) { activeTopics = activeTopics.filter(x => x !== t); renderTopicList(); }

  function getClientUrl(t) {
    const url = new URL(location.href);
    const path = url.pathname.replace(/\/admin(\.html)?$/, '/client.html');
    return `${url.origin}${path}?topic=${encodeURIComponent(t)}`;
  }

  function renderTopicList() {
    const ui = document.getElementById('topic-list-ui');
    ui.innerHTML = activeTopics.map(t => `
        <div class="topic-item">
            <div>
                <div style="font-weight:700;">${t}</div>
                <div class="topic-url">${getClientUrl(t)}</div>
            </div>
            <div style="display:flex; gap:8px;">
                <button class="btn btn-ghost" onclick="copyText('${getClientUrl(t)}')">URLコピー</button>
                <button class="btn btn-red" onclick="removeTopic('${t}')">削除</button>
            </div>
        </div>
    `).join('');
  }

  function startDashboard() {
    if (activeTopics.length === 0) return;
    const raw = document.getElementById('setup-roster').value;
    raw.split('\n').forEach(line => {
      const parts = line.split(/[,\t]/).map(s => s.trim());
      if (parts[0]) rosterData[parts[0]] = parts[1] || '';
    });
    switchScreen('screen-dash');
    initChart();
    activeTopics.forEach(t => lastMessageIds[t] = 'all');
    pollAll();
    setInterval(pollAll, POLL_INTERVAL);
  }

  async function pollAll() {
    const polls = activeTopics.map(async topic => {
        try {
            const since = lastMessageIds[topic];
            const resp = await fetch(`${NTFY_BASE}/${topic}/json?poll=1&since=${since}`);
            if (!resp.ok) return;
            const text = await resp.text();
            text.trim().split('\n').filter(Boolean).forEach(line => {
                const msg = JSON.parse(line);
                if (msg.event === 'message') {
                    processMessage(topic, msg);
                    lastMessageIds[topic] = msg.id;
                }
            });
        } catch(e) {}
    });
    await Promise.all(polls);
    updateDashboardUI();
    document.getElementById('last-poll-time').textContent = '最終更新: ' + new Date().toLocaleTimeString();
  }

  function processMessage(topic, msg) {
    const parts = (msg.message || '').split(':');
    const type = parts[0];
    const sid = parts[1];
    if (type === 'FINISH') { finishedTopics.add(topic); return; }
    if (!sid || !['REGISTER', 'ALERT', 'DISMISS'].includes(type)) return;

    const key = `${topic}:${sid}`;
    const ts  = new Date(msg.time * 1000);
    if (!studentStates[key]) studentStates[key] = { topic, sid, status: 'safe', alertCount: 0, lastAlert: null, alerts: [] };

    if (type === 'REGISTER') { studentStates[key].status = 'safe'; addLog(topic, sid, '監視開始', ts); }
    else if (type === 'ALERT') {
        const isNew = studentStates[key].status !== 'alert';
        studentStates[key].status = 'alert';
        studentStates[key].alertCount++;
        studentStates[key].lastAlert = ts;
        if (isNew) { showToast(topic, sid); addLog(topic, sid, '接続検知🚨', ts); updateChartWithAlert(ts); }
    } else if (type === 'DISMISS') { studentStates[key].status = 'safe'; addLog(topic, sid, '解除', ts); }
  }

  function updateDashboardUI() {
    const states = Object.values(studentStates);
    const alerts = states.filter(s => s.status === 'alert').length;
    const safe   = states.filter(s => s.status === 'safe').length;
    const allSeen = new Set(states.map(s => s.sid));
    let absent = 0;
    Object.keys(rosterData).forEach(rsid => { if(!allSeen.has(rsid)) absent++; });

    document.getElementById('stat-exams').textContent = activeTopics.length;
    document.getElementById('stat-total').textContent = states.length + absent;
    document.getElementById('stat-safe').textContent  = safe;
    document.getElementById('stat-alert').textContent = alerts;
    document.getElementById('stat-absent').textContent = absent;

    const activeList = states.filter(s => s.status === 'alert').sort((a,b) => b.lastAlert - a.lastAlert);
    document.getElementById('active-alerts-list').innerHTML = activeList.map(s => `
      <div class="alert-card">
        <div style="display:flex; justify-content:space-between;">
          <div style="font-size:0.7rem; color:var(--muted);">${s.topic}</div>
          <button class="btn btn-red" style="padding:2px 8px; font-size:0.65rem;" onclick="confirmAlert('${s.topic}','${s.sid}')">確認</button>
        </div>
        <div style="font-weight:800; color:var(--red); font-size:1.1rem;">${s.sid}</div>
        <div style="font-size:0.8rem;">${rosterData[s.sid] || '---'}</div>
        <div style="font-size:0.6rem; color:var(--muted); margin-top:5px;">最終: ${s.lastAlert.toLocaleTimeString()}</div>
      </div>
    `).join('');

    const tableRows = [...states];
    Object.keys(rosterData).forEach(rsid => { if(!allSeen.has(rsid)) tableRows.push({ topic:'-', sid:rsid, status:'absent', alertCount:0, lastAlert:null }); });
    tableRows.sort((a, b) => {
      if (a.status==='alert' && b.status!=='alert') return -1;
      if (b.status==='alert' && a.status!=='alert') return 1;
      return a.sid.localeCompare(b.sid, undefined, { numeric:true });
    });

    document.getElementById('main-tbody').innerHTML = tableRows.map(s => {
      const isUnreg = (s.status!=='absent') && !rosterData[s.sid];
      return `
        <tr class="${s.status==='alert'?'row-alert':''} ${s.status==='absent'?'row-absent':''}">
          <td style="font-size:0.7rem;">${s.topic}</td>
          <td><strong style="${isUnreg?'color:var(--orange);':''}">${s.sid}</strong></td>
          <td style="font-size:0.8rem;">${rosterData[s.sid] || '(未登録)'}</td>
          <td><span class="status-pill ${isUnreg?'unregistered':s.status}">${isUnreg?'⚠️未登録':s.status.toUpperCase()}</span></td>
          <td>${s.alertCount}</td>
          <td style="font-size:0.7rem;">${s.lastAlert?s.lastAlert.toLocaleTimeString():'---'}</td>
          <td>
            <div style="display:flex; gap:4px;">
              ${s.status==='alert' ? `<button class="btn btn-red" onclick="confirmAlert('${s.topic}','${s.sid}')">解</button>` : ''}
              ${s.topic!=='-' && !finishedTopics.has(s.topic) ? `<button class="btn btn-ghost" onclick="terminateExam('${s.topic}')">終</button>` : ''}
            </div>
          </td>
        </tr>`;
    }).join('');
  }

  async function terminateExam(topic) {
    if (!confirm('終了しますか？')) return;
    try {
        await fetch(`${NTFY_BASE}/${topic}`, { method: 'POST', body: 'FINISH:ALL:END' });
        finishedTopics.add(topic);
        updateDashboardUI();
    } catch(e) { alert('通信エラー'); }
  }

  function confirmAlert(topic, sid) {
    const key = `${topic}:${sid}`;
    if (studentStates[key]) { studentStates[key].status = 'safe'; updateDashboardUI(); }
  }

  function initChart() {
    const ctx = document.getElementById('alertChart').getContext('2d');
    alertChart = new Chart(ctx, { type:'line', data:chartData, options:{ responsive:true, maintainAspectRatio:false, scales:{ x:{grid:{display:false}}, y:{beginAtZero:true,ticks:{stepSize:1}} }, plugins:{legend:{display:false}} } });
  }

  function updateChartWithAlert(ts) {
    const time = ts.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    const idx = chartData.labels.indexOf(time);
    if (idx>=0) chartData.datasets[0].data[idx]++;
    else { chartData.labels.push(time); chartData.datasets[0].data.push(1); if(chartData.labels.length>20){chartData.labels.shift(); chartData.datasets[0].data.shift();} }
    alertChart.update();
  }

  function addLog(t, sid, action, ts) {
    const log = document.getElementById('log-box');
    const div = document.createElement('div');
    div.style.padding = '2px 0';
    div.innerHTML = `<span style="color:var(--muted)">[${ts.toLocaleTimeString()}]</span> <b>${t}</b>:${sid} → ${action}`;
    log.prepend(div);
  }

  function showToast(t, sid) {
    const wrap = document.getElementById('toast-wrap');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `🚨 <b>検知</b><br>${t} - ${sid}`;
    wrap.appendChild(toast);
    if (Notification.permission==='granted') new Notification('🚨 接続検知', { body:`${t} / ${sid}` });
    setTimeout(() => { toast.remove(); }, 5000);
  }

  function copyText(val) {
    navigator.clipboard.writeText(val).then(() => alert('コピーしました'));
  }

  function switchScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
</script>
</body>
</html>
