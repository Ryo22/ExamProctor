<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>接続監視システム | 統合管理ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --green:   #22c55e;
      --red:     #ef4444;
      --blue:    #3b82f6;
      --orange:  #f97316;
    }
    body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    
    /* Header & Navigation */
    .app-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .nav-tabs { display: flex; gap: 5px; background: var(--bg); padding: 5px; border-radius: 10px; margin-left: 20px; }
    .nav-tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 700; color: var(--muted); transition: all 0.2s; }
    .nav-tab.active { background: var(--surface); color: var(--blue); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .nav-tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.05); }

    /* Content Area */
    .app-viewport { flex: 1; overflow-y: auto; padding: 1.5rem; max-width: 1400px; margin: 0 auto; width: 100%; }
    .page { display: none; animation: fadeIn 0.3s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* Common Card */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card h2 { font-size: 0.85rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 8px; }

    /* Dashboard Grid */
    .dash-grid { display: grid; grid-template-columns: 1fr 340px; gap: 1.5rem; }
    .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; text-align: center; }
    .stat-val { font-size: 1.8rem; font-weight: 900; line-height: 1; }
    .stat-lbl { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; margin-top: 5px; }

    /* Exam Cards Scrollable */
    .exam-scroll { border-radius: 12px; padding-bottom: 10px; overflow-x: auto; display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .exam-chip { min-width: 180px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer; transition: 0.2s; position: relative; }
    .exam-chip:hover { border-color: var(--blue); }
    .exam-chip.active { border-color: var(--blue); background: rgba(59,130,246,0.1); box-shadow: 0 0 15px rgba(59,130,246,0.15); }
    .exam-chip-name { font-weight: 800; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; }

    /* Table Styles */
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 12px; color: var(--muted); font-size: 0.7rem; border-bottom: 1px solid var(--border); }
    td { padding: 12px; border-bottom: 1px solid var(--border); }
    tr.alert-row { background: rgba(239, 68, 68, 0.05); }

    .pill { padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; }
    .pill.ALERT { background: var(--red); color: white; }
    .pill.FOCUS-LOST { background: var(--orange); color: white; }
    .pill.SAFE { background: rgba(34,197,94,0.15); color: var(--green); }

    /* Forms */
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--muted); margin-bottom: 5px; }
    input, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; font-family: inherit; }
    .btn { border: none; cursor: pointer; border-radius: 8px; font-weight: 700; padding: 10px 20px; transition: 0.2s; }
    .btn-blue { background: var(--blue); color: white; }
    .btn-red { background: rgba(239,68,68,0.15); color: var(--red); }
    .btn-green { background: var(--green); color: black; }

    /* Chart Container */
    .chart-container { height: 200px; position: relative; }
  </style>
</head>
<body>

<header class="app-header">
  <div style="display:flex; align-items:center;">
    <h1 style="font-size:1.2rem; font-weight:900;">🛡️ ProctorSystem</h1>
    <div class="nav-tabs">
      <div class="nav-tab active" data-target="page-dash">ダッシュボード</div>
      <div class="nav-tab" data-target="page-sessions">試験管理</div>
      <div class="nav-tab" data-target="page-roster">名簿マスタ</div>
      <div class="nav-tab" data-target="page-log">システムログ</div>
    </div>
  </div>
  <div style="display:flex; align-items:center; gap:15px;">
    <span id="sync-indicator" style="font-size:0.65rem; color:var(--muted);">● 同期中</span>
    <button class="btn btn-red" style="padding:5px 10px; font-size:0.7rem;" onclick="hardReset()">リセット</button>
  </div>
</header>

<main class="app-viewport">
  <!-- DASHBOARD PAGE -->
  <div id="page-dash" class="page active">
    <div class="stat-row">
      <div class="stat-box"><div class="stat-val" id="stat-total">0</div><div class="stat-lbl">参加人数</div></div>
      <div class="stat-box" style="color:var(--red);"><div class="stat-val" id="stat-alert">0</div><div class="stat-lbl">検知中</div></div>
      <div class="stat-box" style="color:var(--orange);"><div class="stat-val" id="stat-focus">0</div><div class="stat-lbl">画面脱落</div></div>
      <div class="stat-box"><div class="stat-val" id="stat-sessions">0</div><div class="stat-lbl">セッション数</div></div>
    </div>

    <h2>📅 試験セッション選択</h2>
    <div class="exam-scroll" id="exam-cards-container"></div>

    <div class="dash-grid">
      <div class="grid-left">
        <div class="card">
          <h2>📈 検知トレンド (直近1時間)</h2>
          <div class="chart-container"><canvas id="alertChart"></canvas></div>
        </div>
        <div class="card">
          <h2>👥 受験生一覧 <small id="filter-label" style="margin-left:auto; color:var(--blue);"></small></h2>
          <div style="overflow-x:auto;">
            <table>
              <thead><tr><th>試験</th><th>学籍番号</th><th>氏名</th><th>状態</th><th>回数</th><th>操作</th></tr></thead>
              <tbody id="student-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="grid-right">
        <div class="card" style="max-height: 400px; overflow-y:auto;">
          <h2>🚨 最新のアラート</h2>
          <div id="active-alerts-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- SESSION MGMT PAGE -->
  <div id="page-sessions" class="page">
    <div class="card">
      <h2>🆕 新規セッション作成</h2>
      <div style="display:flex; gap:10px;">
        <input type="text" id="new-topic-input" placeholder="試験名を入力 (例: IT-Test-2024)" />
        <button class="btn btn-blue" onclick="addTopic()">追加</button>
      </div>
    </div>
    <div id="session-manager-list" class="topic-list"></div>
  </div>

  <!-- ROSTER PAGE -->
  <div id="page-roster" class="page">
    <div class="card">
      <h2>📋 名簿マスタ登録</h2>
      <p style="font-size:0.7rem; color:var(--muted); margin-bottom:10px;">CSV形式（学籍番号,氏名）で貼り付けて保存してください。</p>
      <textarea id="roster-input" style="height:300px; font-family:monospace; font-size:0.8rem;" placeholder="2024001,田中太郎"></textarea>
      <button class="btn btn-green" style="margin-top:1rem;" onclick="saveRoster()">名簿を保存</button>
    </div>
  </div>

  <!-- LOG PAGE -->
  <div id="page-log" class="page">
    <div class="card">
      <h2>📝 通信ログ</h2>
      <div id="system-log-box" style="font-size:0.7rem; font-family:monospace; background:var(--bg); padding:1rem; border-radius:10px; height:600px; overflow-y:auto;"></div>
    </div>
  </div>
</main>

<script>
  // --- Constants & Persistence ---
  const NTFY_BASE     = 'https://ntfy.sh';
  const STORAGE_KEY   = 'proctor_admin_data';
  const CHART_LIMIT   = 60; // 1分ごとのデータを保持
  
  let state = {
    topics: [],
    roster: {},
    studentStates: {},
    lastIds: {},
    chartLabels: [],
    chartHits: []
  };

  function loadState() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
        const parsed = JSON.parse(raw);
        state = { ...state, ...parsed };
    }
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
        topics: state.topics,
        roster: state.roster,
        lastIds: state.lastIds,
        studentStates: state.studentStates
    }));
  }

  // --- UI Logic ---
  let filterTopic = null;
  let alertChart = null;

  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.target).classList.add('active');
    });
  });

  function initChart() {
    const ctx = document.getElementById('alertChart').getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, 0, 200);
    gradient.addColorStop(0, 'rgba(239, 68, 68, 0.4)');
    gradient.addColorStop(1, 'rgba(239, 68, 68, 0)');

    alertChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: state.chartLabels,
            datasets: [{
                label: '検知数',
                data: state.chartHits,
                borderColor: '#ef4444',
                backgroundColor: gradient,
                fill: true,
                tension: 0.4,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { display: false },
                y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { stepSize: 1, color: '#64748b' } }
            },
            plugins: { legend: { display: false } }
        }
    });
  }

  function updateChartData(ts) {
    const label = new Date(ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    const idx = state.chartLabels.indexOf(label);
    if (idx >= 0) {
        state.chartHits[idx]++;
    } else {
        state.chartLabels.push(label);
        state.chartHits.push(1);
        if (state.chartLabels.length > CHART_LIMIT) {
            state.chartLabels.shift();
            state.chartHits.shift();
        }
    }
    if (alertChart) alertChart.update('none');
  }

  function addTopic() {
    const input = document.getElementById('new-topic-input');
    const t = input.value.trim();
    if (t && !state.topics.includes(t)) {
        state.topics.push(t);
        state.lastIds[t] = 'all';
        input.value = '';
        saveState();
        renderSessionManager();
        renderDashboard();
    }
  }

  function saveRoster() {
    const raw = document.getElementById('roster-input').value;
    state.roster = {};
    raw.split('\n').forEach(line => {
        const p = line.split(/[,\t]/).map(s=>s.trim());
        if (p[0]) state.roster[p[0]] = p[1] || '';
    });
    saveState();
    alert('名簿を保存しました。');
    renderDashboard();
  }

  // --- Sync & Processing ---
  async function pollAll() {
    const list = state.topics.map(async topic => {
        try {
            const since = state.lastIds[topic] || 'all';
            const resp = await fetch(`${NTFY_BASE}/${topic}/json?poll=1&since=${since}`);
            if (!resp.ok) return;
            const text = await resp.text();
            text.trim().split('\n').filter(Boolean).forEach(line => {
                const msg = JSON.parse(line);
                if (msg.event === 'message') {
                    state.lastIds[topic] = msg.id;
                    processMessage(topic, msg);
                }
            });
        } catch(e) {}
    });
    await Promise.all(list);
    renderDashboard();
    document.getElementById('sync-indicator').textContent = '● 同期完了 - ' + new Date().toLocaleTimeString();
  }

  function processMessage(topic, msg) {
    const parts = (msg.message || '').split(':');
    const type = parts[0], sid = parts[1], note = parts[2];
    if (!sid) return;

    const key = `${topic}:${sid}`;
    const ts  = new Date(msg.time * 1000);
    
    if (!state.studentStates[key]) {
        state.studentStates[key] = { topic, sid, status: 'SAFE', alertCount: 0, lastCheck: ts };
    }

    const s = state.studentStates[key];
    s.lastCheck = ts;

    if (type === 'ALERT') {
        if (s.status !== 'ALERT') {
            notifyOS(`🚨 接続検知: ${sid}`, `${topic} にて不正な通信を検知`);
            updateChartData(ts);
        }
        s.status = 'ALERT';
        s.alertCount++;
        addLog(topic, sid, '⚠️ 検知!!', ts);
    } else if (type === 'FOCUS_LOST') {
        s.status = 'FOCUS-LOST';
        addLog(topic, sid, '👁️ 画面離脱', ts);
        notifyOS(`👁️ 画面切り替え: ${sid}`, `Excel等へ移動した可能性があります`);
    } else if (type === 'FOCUS_GAINED') {
        s.status = 'SAFE';
        addLog(topic, sid, '画面復帰', ts);
    } else if (type === 'REGISTER') {
        s.status = 'SAFE';
        addLog(topic, sid, '監視開始', ts);
    } else if (type === 'DISMISS') {
        s.status = 'SAFE';
    }
    saveState();
  }

  function notifyOS(title, body) {
    if (Notification.permission === 'granted') new Notification(title, { body });
  }

  // --- Renders ---
  function renderDashboard() {
    const all = Object.values(state.studentStates);
    const filtered = filterTopic ? all.filter(s => s.topic === filterTopic) : all;

    // Stats
    document.getElementById('stat-total').textContent = all.length;
    document.getElementById('stat-alert').textContent = all.filter(s=>s.status==='ALERT').length;
    document.getElementById('stat-focus').textContent = all.filter(s=>s.status==='FOCUS-LOST').length;
    document.getElementById('stat-sessions').textContent = state.topics.length;

    // Exam Cards
    let cards = `<div class="exam-chip ${!filterTopic?'active':''}" onclick="filterTopic=null;renderDashboard()">
        <div class="exam-chip-name">全体表示</div>
        <small style="color:var(--muted)">累計 ${all.length}名</small>
    </div>`;
    state.topics.forEach(t => {
        const count = all.filter(s=>s.topic===t).length;
        cards += `<div class="exam-chip ${filterTopic===t?'active':''}" onclick="filterTopic='${t}';renderDashboard()">
            <div class="exam-chip-name">${t}</div>
            <small style="color:var(--muted)">${count}名</small>
        </div>`;
    });
    document.getElementById('exam-cards-container').innerHTML = cards;

    // Student Table
    document.getElementById('student-tbody').innerHTML = filtered.sort((a,b)=>a.sid.localeCompare(b.sid, undefined, {numeric:true})).map(s => `
        <tr class="${s.status==='ALERT'?'alert-row':''}">
            <td style="font-size:0.7rem; color:var(--muted);">${s.topic}</td>
            <td><b>${s.sid}</b></td>
            <td>${state.roster[s.sid] || '<small style="color:var(--orange)">未登録</small>'}</td>
            <td><span class="pill ${s.status}">${s.status}</span></td>
            <td>${s.alertCount}</td>
            <td><button class="btn btn-red" style="padding:4px 8px; font-size:0.65rem;" onclick="dismissAlert('${s.topic}','${s.sid}')">解除</button></td>
        </tr>
    `).join('');

    // Active Alerts List
    document.getElementById('active-alerts-list').innerHTML = all.filter(s=>s.status==='ALERT').map(s=>`
        <div style="background:rgba(239,68,68,0.1); border:1px solid var(--red); padding:10px; border-radius:10px; margin-bottom:10px;">
            <b>${s.sid}</b> (${s.topic})<br><small>最後に検知：${new Date(s.lastCheck).toLocaleTimeString()}</small>
        </div>
    `).join('');
    
    document.getElementById('filter-label').textContent = filterTopic ? `フィルタ：${filterTopic}` : "フィルタ：全体";
  }

  function renderSessionManager() {
    const ui = document.getElementById('session-manager-list');
    ui.innerHTML = state.topics.map(t => {
        const url = getClientUrl(t);
        return `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div style="overflow:hidden; flex:1;">
                    <b style="font-size:1.1rem; color:var(--blue);">${t}</b><br>
                    <small style="color:var(--muted); cursor:pointer;" onclick="navigator.clipboard.writeText('${url}');alert('コピーしました')">${url}</small>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-red" onclick="terminateSession('${t}')">一括終了</button>
                    <button class="btn btn-red" style="background:transparent; border:1px solid var(--border);" onclick="deleteTopic('${t}')">削除</button>
                </div>
            </div>
        `;
    }).join('');
  }

  function getClientUrl(t) {
    const u = new URL(location.href);
    const basePath = u.pathname.substring(0, u.pathname.lastIndexOf('/') + 1);
    return `${u.origin}${basePath}client.html?topic=${encodeURIComponent(t)}`;
  }

  function dismissAlert(t, s) {
    const key = `${t}:${s}`;
    if (state.studentStates[key]) {
        state.studentStates[key].status = 'SAFE';
        saveState();
        renderDashboard();
    }
  }

  function deleteTopic(t) {
    if (confirm(`${t} を完全に削除しますか？`)) {
        state.topics = state.topics.filter(x => x !== t);
        delete state.lastIds[t];
        saveState();
        renderSessionManager();
        renderDashboard();
    }
  }

  async function terminateSession(t) {
    if (confirm(`${t} の試験を一括終了します。`)) {
        await fetch(`${NTFY_BASE}/${t}`, { method: 'POST', body: 'FINISH_ALL_SIGNAL', headers: { 'X-Priority':'5' } });
        alert('終了信号を送信しました。');
    }
  }

  function addLog(t, s, a, ts) {
    const box = document.getElementById('system-log-box');
    const div = document.createElement('div');
    div.innerHTML = `<span style="color:var(--muted)">[${ts.toLocaleTimeString()}]</span> <b>${s}</b>(${t}) → ${a}`;
    box.prepend(div);
  }

  function hardReset() {
    if (confirm('すべての登録データと監視履歴を消去します。続行しますか？')) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
    }
  }

  // --- Initial Start ---
  window.onload = () => {
    loadState();
    
    // UI反映
    if (state.roster) {
        document.getElementById('roster-input').value = Object.entries(state.roster).map(([k,v]) => `${k},${v}`).join('\n');
    }
    
    initChart();
    renderSessionManager();
    renderDashboard();
    
    // 定期ポーリング開始
    pollAll();
    setInterval(pollAll, POLL_INTERVAL);
  };
</script>
</body>
</html>
