<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>接続監視システム | クラウド統合ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Supabase SDK -->
  <script>
  // 🌩️ Supabase 設定
  const SUPABASE_URL = 'https://dkjftwhvhsxgcqawemmi.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRramZ0d2h2aHN4Z2NxYXdlbW1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4ODk5MzUsImV4cCI6MjA4OTQ2NTkzNX0.s4lYa3NRpM3ADs5esfVa_fpaAkVj4NLk7MKzgkSKsFo';
  
  let sb = null;
  const NTFY_BASE = 'https://ntfy.sh';
  const POLL_INTERVAL = 3000;
  
  let state = { topics:[], roster: {}, studentStates: {}, lastIds: {} };
  let hasAlertedReadError = false;

  async function initCloud() {
    try {
        sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        document.getElementById('sb-url').value = SUPABASE_URL;
        document.getElementById('sb-key').value = SUPABASE_KEY;
        await pullFromCloud();
    } catch(e) { console.error('Cloud Init Error:', e); }
  }

  // ★ 修正箇所：安全な保存処理
  async function pushToCloud() {
    if (!sb) return;
    try {
        const payload = { key: 'admin_state', data: { topics: state.topics, roster: state.roster } };
        const { error } = await sb.from('settings').upsert(payload);
        
        if (error) {
            console.error("❌ Supabase 保存エラー:", error);
            document.getElementById('cloud-sync-status').textContent = '● 保存失敗 (再試行中...)';
            document.getElementById('cloud-sync-status').style.color = 'var(--red)';
        } else {
            document.getElementById('cloud-sync-status').textContent = '● クラウド同期済み ' + new Date().toLocaleTimeString();
            document.getElementById('cloud-sync-status').style.color = 'var(--green)';
        }
    } catch(e) { console.error("❌ 予期せぬ保存例外:", e); }
  }

  // ★ 修正箇所：安全な読込処理（UIのちらつき防止）
  async function pullFromCloud() {
    if (!sb) return;
    try {
        const { data, error } = await sb.from('settings').select('data').eq('key', 'admin_state');
        
        if (error) {
            console.error("❌ Supabase 読込エラー:", error);
            document.getElementById('cloud-sync-status').textContent = '● 読込エラー';
            document.getElementById('cloud-sync-status').style.color = 'var(--red)';
            return;
        }

        if (data && data.length > 0 && data[0].data) {
            // 現在のステートとクラウドのステートをマージ（ローカルの監視状態を消さないため）
            const cloudTopics = data[0].data.topics ||[];
            const cloudRoster = data[0].data.roster || {};
            
            // クラウド側で削除されたトピックや名簿をローカルにも反映
            state.topics = cloudTopics;
            
            // 名簿データはクラウドを正とするが、メモリ上の一時的なものは残す
            for(let sid in cloudRoster) {
                state.roster[sid] = cloudRoster[sid];
            }

            renderAll();
            document.getElementById('cloud-sync-status').textContent = '● クラウド同期済み';
            document.getElementById('cloud-sync-status').style.color = 'var(--green)';
        }
    } catch(e) { console.error("❌ 予期せぬ読込例外:", e); }
  }

  function syncNow() { pullFromCloud(); }

  // 🔑 Auth
  function handleLogin() {
    if (document.getElementById('login-email').value === 'admin@example.com' && document.getElementById('login-pass').value === 'password123') {
        sessionStorage.setItem('admin_logged_in', 'true'); showAdminApp();
    } else { document.getElementById('login-error').textContent = '認証失敗'; }
  }
  
  async function showAdminApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.querySelector('.app-header').style.display = 'flex';
    document.querySelector('.app-viewport').classList.add('visible');
    await initCloud();
    renderAll();
    setInterval(pollAll, POLL_INTERVAL);
    setInterval(pullFromCloud, 10000); // 10秒ごとの自動同期
  }
  window.onload = () => { if (sessionStorage.getItem('admin_logged_in') === 'true') showAdminApp(); };

  function renderAll() { renderDashboard(); renderSessionManager(); renderRosterMaster(); }
  function saveAndSync() { pushToCloud(); renderAll(); }

  let filterTopic = null, filterGroup = null;

  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      tab.classList.add('active'); document.getElementById(tab.dataset.target).classList.add('active');
    });
  });

  function addTopic() {
    const val = document.getElementById('new-topic-input').value.trim();
    if (val && !state.topics.includes(val)) { state.topics.push(val); saveAndSync(); document.getElementById('new-topic-input').value=''; }
  }

  function renderSessionManager() {
    document.getElementById('session-manager-list').innerHTML = state.topics.sort().map(t => {
      const url = getClientUrl(t);
      return `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
        <div><b style="font-size:1.2rem;">${t}</b><br>
            <div style="display:flex; align-items:center; gap:8px; margin-top:8px;">
                <input type="text" value="${url}" readonly style="font-size:0.65rem; padding:4px 8px; width:220px; background:var(--bg);" id="url-${t}"/>
                <button class="btn btn-ghost" onclick="copyUrl('${t}')">URLコピー</button>
            </div>
        </div>
        <button class="btn btn-red" style="padding:4px 12px; font-size:0.75rem;" onclick="deleteTopic('${t}')">削除</button>
      </div>`;
    }).join('');
  }

  function copyUrl(t) {
    const el = document.getElementById('url-' + t); el.select(); document.execCommand('copy');
    alert('コピーしました: ' + el.value);
  }

  function getClientUrl(t) {
    const u = new URL(location.href);
    let bp = u.pathname.replace(/\/adminclient\.html$/, '/').replace(/\/admin\.html$/, '/').replace(/\/admin$/, '/');
    if (!bp.endsWith('/')) bp += '/';
    return `${u.origin}${bp}client.html?topic=${encodeURIComponent(t)}`;
  }

  function deleteTopic(t) { if(confirm('削除しますか？')){ state.topics=state.topics.filter(x=>x!==t); saveAndSync(); } }

  // ★ 修正箇所：無限セーブのバグを修正したポーリング処理
  async function pollAll() {
    let isRosterUpdated = false;

    for (const t of state.topics) {
        try {
            const resp = await fetch(`${NTFY_BASE}/${t}/json?poll=1&since=${state.lastIds[t] || 'all'}`, { cache: 'no-store' });
            if (!resp.ok) continue;
            const text = await resp.text();
            
            text.trim().split('\n').filter(Boolean).forEach(line => {
                const msg = JSON.parse(line);
                if (msg.event === 'message') {
                    // ★ lastIds を更新して、同じメッセージを二度と読まないようにする
                    state.lastIds[t] = msg.id;
                    const parts = msg.message.split(':');
                    const type = parts[0], sid = parts[1];
                    if (!sid) return;

                    // ★ 名簿にない場合のみ新規追加（すでにキーが存在する場合は無視）
                    if (typeof state.roster[sid] === 'undefined') {
                        state.roster[sid] = { name: '⚠️ 未登録', group: '未分類' };
                        isRosterUpdated = true;
                    }

                    if (!state.studentStates[`${t}:${sid}`]) state.studentStates[`${t}:${sid}`] = { topic: t, sid, status: 'SAFE', alertCount: 0 };
                    const s = state.studentStates[`${t}:${sid}`];
                    if (type === 'ALERT') { s.status = 'ALERT'; s.alertCount++; }
                    else if (type === 'FOCUS_LOST') s.status = 'FOCUS-LOST';
                    else if (type === 'REGISTER' || type === 'FOCUS_GAINED' || type === 'DISMISS') s.status = 'SAFE';
                }
            });
        } catch(e) {}
    }
    
    if (isRosterUpdated) {
        // 本当に新しいユーザーが来た時だけSupabaseへ書き込む
        saveAndSync();
    } else {
        // 既存ユーザーのステータス変化（オンライン・アラートなど）は画面だけ更新（DB保存はしない）
        renderDashboard();
    }
  }

  window.setFilterGroup = function(g) { filterGroup = g; renderDashboard(); };
  window.setFilterTopic = function(t) { filterTopic = t; renderDashboard(); };

  function renderDashboard() {
    const rosterIds = Object.keys(state.roster);
    
    const otherGroups =[...new Set(rosterIds.map(id => state.roster[id].group))].sort();
    const groupHtml = `
        <div class="filter-chip filter-all ${(filterGroup === null) ? 'active':''}" onclick="setFilterGroup(null)">全体表示</div>
        ${otherGroups.map(g => `
            <div class="filter-chip ${(filterGroup === g) ? 'active':''}" onclick="setFilterGroup('${g}')">${g}</div>
        `).join('')}`;
    document.getElementById('group-filter-container').innerHTML = groupHtml;
    
    const otherTopics =[...state.topics].sort();
    const topicHtml = `
        <div class="filter-chip filter-all ${(filterTopic === null) ? 'active':''}" onclick="setFilterTopic(null)">全体表示</div>
        ${otherTopics.map(t => `
            <div class="filter-chip ${(filterTopic === t) ? 'active':''}" onclick="setFilterTopic('${t}')">${t}</div>
        `).join('')}`;
    document.getElementById('topic-filter-container').innerHTML = topicHtml;

    const allStudentKeysSet = new Set(Object.keys(state.studentStates));
    state.topics.forEach(t => { rosterIds.forEach(sid => { allStudentKeysSet.add(`${t}:${sid}`); }); });

    let rows =[], unknownCount = 0;
    allStudentKeysSet.forEach(key => {
        const [t, sid] = key.split(':');
        const rInfo = state.roster[sid];
        const sInfo = state.studentStates[key] || { topic:t, sid, status:'OFFLINE', alertCount:0 };
        
        if (filterTopic !== null && t !== filterTopic) return;
        if (filterGroup !== null && (!rInfo || rInfo.group !== filterGroup)) return;
        
        const isUnknown = rInfo ? (rInfo.name === '⚠️ 未登録') : true; 
        if (isUnknown && sInfo.status !== 'OFFLINE') unknownCount++;

        rows.push({ 
            topic: t, 
            sid: sid, 
            name: rInfo ? rInfo.name : '⚠️ 未登録', 
            group: rInfo ? rInfo.group : '未分類', 
            status: sInfo.status, 
            alertCount: sInfo.alertCount, 
            isUnknown: isUnknown 
        });
    });

    document.getElementById('stat-total').textContent = rows.length;
    document.getElementById('stat-alert').textContent = rows.filter(r=>r.status==='ALERT').length;
    document.getElementById('stat-focus').textContent = rows.filter(r=>r.status==='FOCUS-LOST').length;
    document.getElementById('stat-unknown').textContent = unknownCount;

    document.getElementById('student-tbody').innerHTML = rows.sort((a,b)=>a.sid.localeCompare(b.sid)).map(r => `
        <tr class="${r.status==='ALERT'?'alert-row':''} ${r.isUnknown?'unknown-row':''}">
            <td><small>${r.group}</small></td><td><b>${r.sid}</b></td><td>${r.name}</td><td>${r.topic}</td>
            <td><span class="pill ${r.status}">${r.status}</span></td><td>${r.alertCount}</td>
            <td><button class="btn btn-ghost" style="padding:2px 8px; font-size:0.7rem;" onclick="dismissAlert('${r.topic}','${r.sid}')">解除</button></td></tr>
    `).join('');
  }

  function dismissAlert(t, s) { if(state.studentStates[`${t}:${s}`]) state.studentStates[`${t}:${s}`].status = 'SAFE'; renderDashboard(); }
  
  function editRoster(sid) {
    const info = state.roster[sid];
    if (!info) return;
    document.getElementById('roster-group').value = info.group;
    document.getElementById('roster-sid').value = sid;
    document.getElementById('roster-name').value = info.name;
    document.getElementById('roster-form-title').textContent = '名簿データの編集';
    document.getElementById('roster-save-btn').textContent = '更新';
    window.location.hash = 'roster-group';
    document.getElementById('roster-group').focus();
  }

  function saveSingleRoster() {
    const sid = document.getElementById('roster-sid').value.trim();
    const name = document.getElementById('roster-name').value.trim();
    const grp = document.getElementById('roster-group').value.trim() || '---';
    if(sid && name) { 
        state.roster[sid] = { name, group: grp }; 
        saveAndSync(); 
        document.getElementById('roster-sid').value = '';
        document.getElementById('roster-name').value = '';
        document.getElementById('roster-group').value = '';
        document.getElementById('roster-form-title').textContent = '名簿登録・一括管理';
        document.getElementById('roster-save-btn').textContent = '保存';
    }
  }

  function deleteRoster(sid) { if(confirm('削除しますか？')){ delete state.roster[sid]; saveAndSync(); } }
  function saveBulkRoster() { document.getElementById('roster-bulk-input').value.split('\n').filter(l=>l).forEach(line => { const p = line.split(/[,\t]/).map(s=>s.trim()); if (p[0] && p[1] && p[2]) state.roster[p[1]] = { name: p[2], group: p[0] }; }); document.getElementById('roster-bulk-input').value = ''; saveAndSync(); }
  function renderRosterMaster() {
    const entries = Object.entries(state.roster).sort((a,b)=>{
        if(a[1].group !== b[1].group) return a[1].group.localeCompare(b[1].group);
        return a[0].localeCompare(b[0]);
    });
    document.getElementById('roster-tbody-master').innerHTML = entries.map(([sid, info]) => `
        <tr>
            <td>${info.group}</td><td><b>${sid}</b></td><td>${info.name}</td>
            <td>
                <button class="btn btn-ghost" style="padding:4px 10px; font-size:0.75rem; color:var(--blue); border-color:var(--blue);" onclick="editRoster('${sid}')">編集</button>
                <button class="btn btn-red" style="padding:4px 10px; font-size:0.75rem;" onclick="deleteRoster('${sid}')">削除</button>
            </td>
        </tr>`).join('');
  }
</script>
</body>
</html>
