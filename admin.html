<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>接続監視システム | 統合管理ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --green:   #22c55e;
      --red:     #ef4444;
      --blue:    #3b82f6;
      --orange:  #f97316;
    }
    body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    
    .app-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .nav-tabs { display: flex; gap: 5px; background: var(--bg); padding: 5px; border-radius: 10px; margin-left: 20px; }
    .nav-tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 700; color: var(--muted); transition: all 0.2s; }
    .nav-tab.active { background: var(--surface); color: var(--blue); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .nav-tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.05); }

    .app-viewport { flex: 1; overflow-y: auto; padding: 1.5rem; max-width: 1400px; margin: 0 auto; width: 100%; }
    .page { display: none; animation: fadeIn 0.3s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card h2 { font-size: 0.85rem; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 8px; }

    .dash-grid { display: grid; grid-template-columns: 1fr 340px; gap: 1.5rem; }
    .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; text-align: center; }
    .stat-val { font-size: 1.8rem; font-weight: 900; line-height: 1; }
    .stat-lbl { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; margin-top: 5px; }

    .filter-scroll { border-radius: 12px; padding-bottom: 10px; overflow-x: auto; display: flex; gap: 0.8rem; margin-bottom: 1rem; scrollbar-width: thin; }
    .filter-chip { min-width: 120px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 16px; cursor: pointer; transition: 0.2s; text-align: center; }
    .filter-chip:hover { border-color: var(--blue); }
    .filter-chip.active { border-color: var(--blue); background: rgba(59,130,246,0.12); box-shadow: 0 0 10px rgba(59,130,246,0.1); }
    .chip-name { font-weight: 800; font-size: 0.85rem; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 12px; color: var(--muted); border-bottom: 1px solid var(--border); font-size: 0.75rem; text-transform: uppercase; }
    td { padding: 12px; border-bottom: 1px solid var(--border); }
    tr.alert-row { background: rgba(239, 68, 68, 0.1); }

    .pill { padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; }
    .pill.ALERT { background: var(--red); color: white; }
    .pill.FOCUS-LOST { background: var(--orange); color: white; }
    .pill.SAFE { background: rgba(34,197,94,0.15); color: var(--green); }
    .pill.OFFLINE { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }

    .form-row { display: flex; gap: 10px; margin-bottom: 1rem; }
    input, select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; font-family: inherit; }
    .btn { border: none; cursor: pointer; border-radius: 8px; font-weight: 700; padding: 8px 16px; transition: 0.2s; white-space: nowrap; }
    .btn-blue { background: var(--blue); color: white; }
    .btn-red { background: rgba(239,68,68,0.15); color: var(--red); }
    .btn-green { background: var(--green); color: black; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); font-size: 0.75rem; }
  </style>
</head>
<body>

<header class="app-header">
  <div style="display:flex; align-items:center;">
    <h1 style="font-size:1.2rem; font-weight:900;">🛡️ ProctorAdmin</h1>
    <div class="nav-tabs">
      <div class="nav-tab active" data-target="page-dash">ダッシュボード</div>
      <div class="nav-tab" data-target="page-sessions">試験管理</div>
      <div class="nav-tab" data-target="page-roster">名簿マスタ</div>
      <div class="nav-tab" data-target="page-log">システムログ</div>
    </div>
  </div>
  <div id="sync-indicator" style="font-size:0.65rem; color:var(--muted);">● 同期中</div>
</header>

<main class="app-viewport">
  <div id="page-dash" class="page active">
    <!-- Stat Cards -->
    <div class="stat-row">
      <div class="stat-box"><div class="stat-val" id="stat-total">0</div><div class="stat-lbl">監視対象</div></div>
      <div class="stat-box" style="color:var(--red);"><div class="stat-val" id="stat-alert">0</div><div class="stat-lbl">検知中</div></div>
      <div class="stat-box" style="color:var(--orange);"><div class="stat-val" id="stat-focus">0</div><div class="stat-lbl">離脱中</div></div>
      <div class="stat-box"><div class="stat-val" id="stat-sessions">0</div><div class="stat-lbl">セッション</div></div>
    </div>

    <!-- Group Filter -->
    <h2>1. フィルター：クラス</h2>
    <div class="filter-scroll" id="group-filter-container"></div>
    
    <!-- Session Filter -->
    <h2>2. フィルター：試験セッション</h2>
    <div class="filter-scroll" id="topic-filter-container"></div>

    <div class="dash-grid">
      <div class="grid-left">
        <div class="card">
          <h2>検知トレンド (分単位)</h2>
          <div style="height:150px;"><canvas id="alertChart"></canvas></div>
        </div>
        <div class="card">
          <h2>受験生状況 (一覧)</h2>
          <div style="overflow-x:auto;">
            <table>
              <thead><tr><th>試験</th><th>クラス</th><th>学籍番号</th><th>氏名</th><th>状態</th><th>検知数</th><th>操作</th></tr></thead>
              <tbody id="student-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="grid-right">
        <div class="card">
          <h2>最新アラート</h2>
          <div id="active-alerts-list" style="font-size:0.8rem;"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="page-sessions" class="page">
    <div class="card">
      <h2>新規試験セッション作成</h2>
      <div class="form-row">
        <input type="text" id="new-topic-input" placeholder="管理名称 (例: Session-A)"/>
        <button class="btn btn-blue" onclick="addTopic()">追加</button>
      </div>
    </div>
    <div id="session-manager-list"></div>
  </div>

  <div id="page-roster" class="page">
    <div class="card">
      <h2>名簿登録・編集</h2>
      <div class="form-row">
        <input type="text" id="roster-sid" placeholder="学籍番号"/>
        <input type="text" id="roster-name" placeholder="氏名"/>
        <input type="text" id="roster-group" placeholder="クラス (例: JP Class)"/>
        <button class="btn btn-blue" onclick="saveSingleRoster()">保存</button>
        <button class="btn btn-ghost" onclick="clearRosterForm()">クリア</button>
      </div>
      <hr style="border:0.5px solid var(--border); margin-bottom:1.5rem;">
      <h2>一括登録 (貼り付け)</h2>
      <p style="font-size:0.75rem; color:var(--muted); margin-bottom:0.5rem;">「学籍番号,氏名,クラス」形式で入力。</p>
      <textarea id="roster-bulk-input" placeholder="2024001,田中太郎,JP Class"></textarea>
      <button class="btn btn-green" onclick="saveBulkRoster()">一括保存</button>
    </div>
    <div class="card">
      <h2>登録済み名簿リスト</h2>
      <table>
        <thead><tr><th>学籍番号</th><th>氏名</th><th>クラス</th><th>操作</th></tr></thead>
        <tbody id="roster-tbody-master"></tbody>
      </table>
    </div>
  </div>

  <div id="page-log" class="page">
    <div class="card"><h2>システムログ</h2><div id="system-log-box" style="font-size:0.75rem; font-family:monospace; height:500px; overflow-y:auto; background:var(--bg); padding:1rem; border-radius:10px;"></div></div>
  </div>
</main>

<script>
  const NTFY_BASE = 'https://ntfy.sh';
  const STORAGE_KEY = 'proctor_admin_data_v4';
  const POLL_INTERVAL = 3000;
  
  let state = { topics: [], roster: {}, studentStates: {}, lastIds: {}, chartLabels: [], chartHits: [] };

  function loadState() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = { ...state, ...JSON.parse(raw) };
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let filterTopic = null;
  let filterGroup = null;
  let alertChart = null;

  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.target).classList.add('active');
      if(tab.dataset.target === 'page-roster') renderRosterMaster();
    });
  });

  function initChart() {
    const ctx = document.getElementById('alertChart').getContext('2d');
    alertChart = new Chart(ctx, {
        type: 'line',
        data: { labels: state.chartLabels, datasets: [{ label: '検知数', data: state.chartHits, borderColor: '#ef4444', tension: 0.4, fill: false }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } } }, plugins: { legend: { display: false } } }
    });
  }

  function updateChart(ts) {
    const label = new Date(ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    const idx = state.chartLabels.indexOf(label);
    if (idx >= 0) { state.chartHits[idx]++; }
    else {
        state.chartLabels.push(label); state.chartHits.push(1);
        if (state.chartLabels.length > 60) { state.chartLabels.shift(); state.chartHits.shift(); }
    }
    if (alertChart) alertChart.update();
  }

  function addTopic() {
    const val = document.getElementById('new-topic-input').value.trim();
    if (val && !state.topics.includes(val)) {
        state.topics.push(val); state.lastIds[val] = 'all';
        document.getElementById('new-topic-input').value = '';
        saveState(); renderSessionManager(); renderDashboard();
    }
  }

  function saveSingleRoster() {
    const sid = document.getElementById('roster-sid').value.trim();
    const name = document.getElementById('roster-name').value.trim();
    const grp = document.getElementById('roster-group').value.trim() || '---';
    if(sid && name) { state.roster[sid] = { name, group: grp }; clearRosterForm(); saveState(); renderRosterMaster(); renderDashboard(); }
  }

  function saveBulkRoster() {
    document.getElementById('roster-bulk-input').value.split('\n').filter(l=>l).forEach(line => {
        const p = line.split(/[,\t]/).map(s=>s.trim());
        if (p[0] && p[1]) state.roster[p[0]] = { name: p[1], group: p[2] || '---' };
    });
    document.getElementById('roster-bulk-input').value = '';
    saveState(); renderRosterMaster(); renderDashboard(); alert('一括保存しました');
  }

  function clearRosterForm() { 
    ['roster-sid', 'roster-name', 'roster-group'].forEach(id => document.getElementById(id).value = '');
  }

  function deleteRoster(sid) {
    if(confirm('削除しますか？')){ delete state.roster[sid]; saveState(); renderRosterMaster(); renderDashboard(); }
  }

  function editRoster(sid) {
    const info = state.roster[sid];
    document.getElementById('roster-sid').value = sid;
    document.getElementById('roster-name').value = info.name;
    document.getElementById('roster-group').value = info.group;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderRosterMaster() {
    document.getElementById('roster-tbody-master').innerHTML = Object.entries(state.roster).sort().map(([sid, info]) => `
      <tr><td><b>${sid}</b></td><td>${info.name}</td><td>${info.group}</td>
          <td>
            <button class="btn btn-blue" style="padding:4px 8px; font-size:0.7rem;" onclick="editRoster('${sid}')">編集</button>
            <button class="btn btn-red" style="padding:4px 8px; font-size:0.7rem;" onclick="deleteRoster('${sid}')">削除</button>
          </td></tr>
    `).join('');
  }

  async function pollAll() {
    for (const t of state.topics) {
        try {
            const resp = await fetch(`${NTFY_BASE}/${t}/json?poll=1&since=${state.lastIds[t] || 'all'}`);
            if (!resp.ok) continue;
            const text = await resp.text();
            text.trim().split('\n').filter(Boolean).forEach(line => {
                const msg = JSON.parse(line);
                if (msg.event === 'message') { state.lastIds[t] = msg.id; processMessage(t, msg); }
            });
        } catch(e) {}
    }
    renderDashboard();
    document.getElementById('sync-indicator').textContent = '● 同期完了 - ' + new Date().toLocaleTimeString();
  }

  function processMessage(topic, msg) {
    const parts = (msg.message || '').split(':');
    const type = parts[0], sid = parts[1];
    if (!sid) return;
    const key = `${topic}:${sid}`;
    const ts = new Date(msg.time * 1000);
    if (!state.studentStates[key]) state.studentStates[key] = { topic, sid, status: 'SAFE', alertCount: 0, lastCheck: ts };
    const s = state.studentStates[key];
    if (new Date(s.lastCheck) > ts) return;
    s.lastCheck = ts;
    if (type === 'ALERT') { s.status = 'ALERT'; s.alertCount++; updateChart(ts); }
    else if (type === 'FOCUS_LOST') { s.status = 'FOCUS-LOST'; }
    else if (type === 'FOCUS_GAINED') { s.status = 'SAFE'; }
    else if (type === 'REGISTER') { s.status = 'SAFE'; }
    else if (type === 'DISMISS') { s.status = 'SAFE'; }
    saveState();
  }

  function renderDashboard() {
    const allRosterIds = Object.keys(state.roster);
    const groups = ['全体表示', ...new Set(allRosterIds.map(id => state.roster[id].group))];
    const topics = ['全体表示', ...state.topics];

    // Filter UI - Groups
    document.getElementById('group-filter-container').innerHTML = groups.map(g => {
        const active = (g === '全体表示' && !filterGroup) || (g === filterGroup);
        return `<div class="filter-chip ${active?'active':''}" onclick="filterGroup='${g==='全体表示'?null:g}';renderDashboard()">
            <div class="chip-name">${g}</div>
        </div>`;
    }).join('');

    // Filter UI - Topics
    document.getElementById('topic-filter-container').innerHTML = topics.map(t => {
        const active = (t === '全体表示' && !filterTopic) || (t === filterTopic);
        return `<div class="filter-chip ${active?'active':''}" onclick="filterTopic='${t==='全体表示'?null:t}';renderDashboard()">
            <div class="chip-name">${t}</div>
        </div>`;
    }).join('');

    const topicsToShow = filterTopic ? [filterTopic] : state.topics;
    let rows = [];

    topicsToShow.forEach(t => {
        allRosterIds.forEach(sid => {
            const info = state.roster[sid];
            if (filterGroup && info.group !== filterGroup) return; // クラスフィルタ
            const key = `${t}:${sid}`;
            const s = state.studentStates[key] || { topic:t, sid, status:'OFFLINE', alertCount:0 };
            rows.push(s);
        });
        // 名簿外からの接続も表示
        if (!filterGroup) {
            Object.keys(state.studentStates).forEach(k => {
                const [top, sid] = k.split(':');
                if (top === t && !state.roster[sid]) rows.push(state.studentStates[k]);
            });
        }
    });

    // Stats
    document.getElementById('stat-total').textContent = rows.length;
    document.getElementById('stat-alert').textContent = rows.filter(s=>s.status==='ALERT').length;
    document.getElementById('stat-focus').textContent = rows.filter(s=>s.status==='FOCUS-LOST').length;
    document.getElementById('stat-sessions').textContent = state.topics.length;

    // Table
    document.getElementById('student-tbody').innerHTML = rows.sort((a,b)=>a.sid.localeCompare(b.sid)).map(s => {
        const info = state.roster[s.sid] || { name: '---', group: '---' };
        return `<tr class="${s.status==='ALERT'?'alert-row':''}">
            <td style="font-size:0.65rem; color:var(--muted);">${s.topic}</td>
            <td><small>${info.group}</small></td>
            <td><b>${s.sid}</b></td>
            <td>${info.name}</td>
            <td><span class="pill ${s.status}">${s.status}</span></td>
            <td>${s.alertCount}</td>
            <td><button class="btn btn-ghost" style="padding:3px 8px;" onclick="dismissAlert('${s.topic}','${s.sid}')">解除</button></td></tr>`;
    }).join('');

    // Active Alerts Box
    document.getElementById('active-alerts-list').innerHTML = rows.filter(s=>s.status==='ALERT').map(s=>`
        <div style="background:rgba(239,68,68,0.08); border:1px solid var(--red); padding:10px; border-radius:8px; margin-bottom:8px;">
            <b>${s.sid}</b> (${s.topic})<br><small>${state.roster[s.sid]?.group || ''}</small>
        </div>
    `).join('');
  }

  function dismissAlert(t, s) { 
    if(state.studentStates[`${t}:${s}`]) state.studentStates[`${t}:${s}`].status = 'SAFE'; 
    saveState(); renderDashboard(); 
  }

  function renderSessionManager() {
    document.getElementById('session-manager-list').innerHTML = state.topics.map(t => {
      const url = getClientUrl(t);
      return `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
        <div><b>${t}</b><br><small style="color:var(--muted); cursor:pointer;" onclick="navigator.clipboard.writeText('${url}');alert('コピーしました')">${url}</small></div>
        <div style="display:flex; gap:10px;"><button class="btn btn-red" onclick="terminateSession('${t}')">一括終了</button>
        <button class="btn btn-ghost" onclick="deleteTopic('${t}')">削除</button></div></div>`;
    }).join('');
  }

  function getClientUrl(t) {
    const u = new URL(location.href);
    let bp = u.pathname.replace(/admin\.html$/, '').replace(/admin$/, '');
    if (!bp.endsWith('/')) bp += '/';
    return `${u.origin}${bp}client.html?topic=${encodeURIComponent(t)}`;
  }

  function deleteTopic(t) { if(confirm('試験を削除しますか？')){ state.topics=state.topics.filter(x=>x!==t); saveState(); location.reload(); }}
  async function terminateSession(t) {
    if(confirm('一括終了しますか？')){ await fetch(`${NTFY_BASE}/${t}`, { method:'POST', body:'FINISH_ALL', headers:{'X-Priority':'5'} }); alert('送信中...'); }
  }
  window.onload = () => { loadState(); initChart(); renderSessionManager(); renderDashboard(); pollAll(); setInterval(pollAll, POLL_INTERVAL); };
</script>
</body>
</html>
