<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>接続監視システム | クラウド統合ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --green:   #22c55e;
      --red:     #ef4444;
      --blue:    #3b82f6;
      --orange:  #f97316;
    }
    body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    
    /* Login Screen */
    #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; text-align: center; }
    
    .app-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .nav-tabs { display: flex; gap: 5px; background: var(--bg); padding: 5px; border-radius: 10px; }
    .nav-tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700; color: var(--muted); }
    .nav-tab.active { background: var(--surface); color: var(--blue); }

    .app-viewport { flex: 1; overflow-y: auto; padding: 1.5rem; max-width: 1400px; margin: 0 auto; width: 100%; display: none; }
    .app-viewport.visible { display: block; }
    .page { display: none; }
    .page.active { display: block; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; text-align: center; }
    .stat-val { font-size: 1.8rem; font-weight: 900; line-height: 1; }
    
    .filter-scroll { overflow-x: auto; display: flex; gap: 0.8rem; margin-bottom: 1rem; padding-bottom: 10px; }
    .filter-chip { min-width: 120px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px; cursor: pointer; text-align: center; flex-shrink: 0; }
    .filter-chip.active { border-color: var(--blue); background: rgba(59,130,246,0.1); }

    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th { text-align: left; padding: 10px; color: var(--muted); border-bottom: 1px solid var(--border); }
    td { padding: 10px; border-bottom: 1px solid var(--border); }
    tr.alert-row { background: rgba(239, 68, 68, 0.1); }

    .btn { border: none; cursor: pointer; border-radius: 8px; font-weight: 700; padding: 8px 16px; }
    .btn-blue { background: var(--blue); color: white; }
    .btn-red { background: rgba(239,68,68,0.1); color: var(--red); }
    input, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; font-family: inherit; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1 style="margin-bottom:1.5rem;">🛡️ クラウド管理者ログイン</h1>
    <p style="font-size:0.7rem; color:var(--muted); margin-bottom:1.5rem;">複数デバイス間で同期・共有が有効です</p>
    <input type="email" id="login-email" placeholder="メールアドレス" style="margin-bottom:1rem;" />
    <input type="password" id="login-pass" placeholder="パスワード" style="margin-bottom:1rem;" />
    <button class="btn btn-blue" style="width:100%; padding:14px;" onclick="handleLogin()">ログイン</button>
    <p id="login-error" style="color:var(--red); font-size:0.75rem; margin-top:1rem;"></p>
  </div>
</div>

<header class="app-header" style="display:none;">
    <div style="display:flex; align-items:center; gap:20px;">
        <h1 style="font-size:1.1rem; font-weight:900;">🛡️ Proctor Cloud</h1>
        <div class="nav-tabs">
            <div class="nav-tab active" data-target="page-dash">ダッシュボード</div>
            <div class="nav-tab" data-target="page-sessions">試験管理</div>
            <div class="nav-tab" data-target="page-roster">名簿マスタ</div>
            <div class="nav-tab" data-target="page-cloud">設定</div>
        </div>
    </div>
    <div id="cloud-sync-status" style="font-size:0.65rem; color:var(--green);">● クラウド同期中</div>
</header>

<main class="app-viewport">
  <!-- Dashboard, Sessions, Roster Page (Same as before, merged below) -->
  <div id="page-dash" class="page active">
    <!-- Stat Cards, Filter chips, Trend chart, Table... -->
    <div class="stat-row">
        <div class="stat-box"><div class="stat-val" id="stat-total">0</div><div class="stat-lbl">監視対象</div></div>
        <div class="stat-box" style="color:var(--red);"><div class="stat-val" id="stat-alert">0</div><div class="stat-lbl">検知中</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-sessions">0</div><div class="stat-lbl">セッション</div></div>
        <div class="stat-box" id="cloud-status-box" style="color:var(--green);"><div class="stat-val">OK</div><div class="stat-lbl">Cloud DB</div></div>
    </div>
    <div class="filter-scroll" id="group-filter-container"></div>
    <div class="filter-scroll" id="topic-filter-container"></div>
    <div class="card">
        <h2>受験生状況一覧</h2>
        <table>
            <thead><tr><th>クラス</th><th>学籍番号</th><th>氏名</th><th>試験</th><th>状態</th><th>回数</th></tr></thead>
            <tbody id="student-tbody"></tbody>
        </table>
    </div>
  </div>

  <div id="page-sessions" class="page">
    <div class="card">
      <h2>新規セッション追加</h2>
      <div style="display:flex; gap:10px;">
        <input type="text" id="new-topic-input" placeholder="セッション名"/>
        <button class="btn btn-blue" onclick="addTopic()">追加</button>
      </div>
    </div>
    <div id="session-manager-list"></div>
  </div>

  <div id="page-roster" class="page">
    <div class="card">
      <div style="display:flex; gap:10px;">
        <input type="text" id="roster-group" placeholder="クラス"/>
        <input type="text" id="roster-sid" placeholder="学籍番号"/>
        <input type="text" id="roster-name" placeholder="氏名"/>
        <button class="btn btn-blue" onclick="saveSingleRoster()">保存</button>
      </div>
      <hr style="margin:1.5rem 0; border:0.5px solid var(--border);">
      <textarea id="roster-bulk-input" rows="4" placeholder="クラス,学籍番号,氏名形式で一括貼り付け"></textarea>
      <button class="btn btn-green" style="margin-top:10px;" onclick="saveBulkRoster()">一括保存</button>
    </div>
    <div class="card">
        <table>
            <thead><tr><th>クラス</th><th>学籍番号</th><th>氏名</th><th>操作</th></tr></thead>
            <tbody id="roster-tbody-master"></tbody>
        </table>
    </div>
  </div>

  <div id="page-cloud" class="page">
    <div class="card">
        <h2>🌩️ クラウド共有設定 (Supabase)</h2>
        <p style="font-size:0.75rem; color:var(--muted); margin-bottom:1rem;">複数のPCで名簿データを共有するための設定です。</p>
        <div style="margin-bottom:1rem;">
            <label style="font-size:0.7rem;">Project URL</label>
            <input type="text" id="sb-url" placeholder="https://xxxx.supabase.co" />
        </div>
        <div style="margin-bottom:1.5rem;">
            <label style="font-size:0.7rem;">Apon Key (Secret)</label>
            <input type="password" id="sb-key" placeholder="eyJhbGciOiJIUzI1..." />
        </div>
        <button class="btn btn-blue" onclick="saveCloudConfig()">接続を保存して同期</button>
        <p style="margin-top:10px; font-size:0.7rem; color:var(--orange);">※ 接続するとブラウザ内のデータは上書きされます。</p>
    </div>
  </div>
</main>

<script>
  let sb = null;
  const NTFY_BASE = 'https://ntfy.sh';
  const POLL_INTERVAL = 3000;
  
  let state = { topics: [], roster: {}, studentStates: {}, lastIds: {}, cloudConfig: null };

  // ---------------------------------------------------------
  // 🌩️ Supabase 同期ロジック
  // ---------------------------------------------------------
  async function initCloud() {
    const config = JSON.parse(localStorage.getItem('proctor_cloud_config') || 'null');
    if (config && config.url && config.key) {
        state.cloudConfig = config;
        sb = supabase.createClient(config.url, config.key);
        document.getElementById('sb-url').value = config.url;
        document.getElementById('sb-key').value = config.key;
        await pullFromCloud();
    }
  }

  async function pushToCloud() {
    if (!sb) return;
    try {
        // 設定用テーブル 'settings' に JSON 形式でまるごと保存
        // ※予め Supabase 側で 'settings' テーブル(key, data)を作成しておく必要があります
        await sb.from('settings').upsert({ key: 'admin_state', data: { topics: state.topics, roster: state.roster } });
        document.getElementById('cloud-sync-status').textContent = '● クラウド保存完了';
    } catch(e) { console.error(e); }
  }

  async function pullFromCloud() {
    if (!sb) return;
    try {
        const { data } = await sb.from('settings').select('data').eq('key', 'admin_state').single();
        if (data && data.data) {
            state.topics = data.data.topics || [];
            state.roster = data.data.roster || {};
            renderAll();
            document.getElementById('cloud-sync-status').textContent = '● クラウド同期済み';
        }
    } catch(e) { console.error(e); }
  }

  function saveCloudConfig() {
    const url = document.getElementById('sb-url').value.trim();
    const key = document.getElementById('sb-key').value.trim();
    localStorage.setItem('proctor_cloud_config', JSON.stringify({ url, key }));
    location.reload();
  }

  // ---------------------------------------------------------
  // 🔑 認証 & 画面制御
  // ---------------------------------------------------------
  function handleLogin() {
    if (document.getElementById('login-email').value === 'admin@example.com' && document.getElementById('login-pass').value === 'password123') {
        sessionStorage.setItem('admin_logged_in', 'true');
        showAdminApp();
    } else { document.getElementById('login-error').textContent = '認証失敗'; }
  }

  async function showAdminApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.querySelector('.app-header').style.display = 'flex';
    document.querySelector('.app-viewport').classList.add('visible');
    loadLocal();
    await initCloud();
    renderAll();
    setInterval(pollAll, POLL_INTERVAL);
  }

  window.onload = () => { if (sessionStorage.getItem('admin_logged_in') === 'true') showAdminApp(); };

  // ---------------------------------------------------------
  // 🛠️ アプリロジック (統合・整理版)
  // ---------------------------------------------------------
  function loadLocal() {
    const raw = localStorage.getItem('proctor_local_state');
    if (raw) {
        const ps = JSON.parse(raw);
        state.topics = ps.topics || [];
        state.roster = ps.roster || {};
    }
  }
  function saveAndSync() {
    localStorage.setItem('proctor_local_state', JSON.stringify({ topics: state.topics, roster: state.roster }));
    pushToCloud();
    renderAll();
  }

  let filterTopic = null, filterGroup = null;

  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.target).classList.add('active');
    });
  });

  function renderAll() {
    renderDashboard();
    renderSessionManager();
    renderRosterMaster();
  }

  function addTopic() {
    const val = document.getElementById('new-topic-input').value.trim();
    if (val && !state.topics.includes(val)) { state.topics.push(val); saveAndSync(); document.getElementById('new-topic-input').value=''; }
  }

  function saveSingleRoster() {
    const sid = document.getElementById('roster-sid').value.trim();
    const name = document.getElementById('roster-name').value.trim();
    const grp = document.getElementById('roster-group').value.trim() || '---';
    if(sid && name) { state.roster[sid] = { name, group: grp }; saveAndSync(); }
  }

  function saveBulkRoster() {
    document.getElementById('roster-bulk-input').value.split('\n').filter(l=>l).forEach(line => {
        const p = line.split(/[,\t]/).map(s=>s.trim());
        if (p[0] && p[1] && p[2]) state.roster[p[1]] = { name: p[2], group: p[0] };
    });
    document.getElementById('roster-bulk-input').value = '';
    saveAndSync();
  }

  function renderRosterMaster() {
    const rows = Object.entries(state.roster).sort((a,b)=>a[1].group.localeCompare(b[1].group) || a[0].localeCompare(b[0]));
    document.getElementById('roster-tbody-master').innerHTML = rows.map(([sid, info]) => `
      <tr><td>${info.group}</td><td><b>${sid}</b></td><td>${info.name}</td>
          <td><button class="btn btn-red" onclick="deleteRoster('${sid}')">削除</button></td></tr>
    `).join('');
  }
  function deleteRoster(sid) { if(confirm('削除？')){ delete state.roster[sid]; saveAndSync(); } }

  async function pollAll() {
    for (const t of state.topics) {
        try {
            const resp = await fetch(`${NTFY_BASE}/${t}/json?poll=1&since=${state.lastIds[t] || 'all'}`, { cache: 'no-store' });
            if (!resp.ok) continue;
            const text = await resp.text();
            text.trim().split('\n').filter(Boolean).forEach(line => {
                const msg = JSON.parse(line);
                if (msg.event === 'message') {
                    state.lastIds[t] = msg.id;
                    const parts = msg.message.split(':');
                    const type = parts[0], sid = parts[1];
                    if (!sid) return;
                    if (!state.studentStates[`${t}:${sid}`]) state.studentStates[`${t}:${sid}`] = { topic: t, sid, status: 'SAFE', alertCount: 0 };
                    const s = state.studentStates[`${t}:${sid}`];
                    if (type === 'ALERT') { s.status = 'ALERT'; s.alertCount++; }
                    else if (type === 'FOCUS_LOST') s.status = 'FOCUS-LOST';
                    else if (type === 'REGISTER' || type === 'FOCUS_GAINED' || type === 'DISMISS') s.status = 'SAFE';
                }
            });
        } catch(e) {}
    }
    renderDashboard();
  }

  function renderDashboard() {
    const rosterIds = Object.keys(state.roster);
    const groups = ['全体表示', ...new Set(rosterIds.map(id => state.roster[id].group))].sort();
    const ts = ['全体表示', ...state.topics].sort();

    document.getElementById('group-filter-container').innerHTML = groups.map(g => `
        <div class="filter-chip ${(!filterGroup && g==='全体表示') || filterGroup===g ? 'active':''}" onclick="filterGroup='${g==='全体表示'?null:g}';renderDashboard()">${g}</div>
    `).join('');
    document.getElementById('topic-filter-container').innerHTML = ts.map(t => `
        <div class="filter-chip ${(!filterTopic && t==='全体表示') || filterTopic===t ? 'active':''}" onclick="filterTopic='${t==='全体表示'?null:t}';renderDashboard()">${t}</div>
    `).join('');

    const topicsToShow = filterTopic ? [filterTopic] : state.topics;
    let rows = [];
    topicsToShow.forEach(t => {
        rosterIds.forEach(sid => {
            if (filterGroup && state.roster[sid].group !== filterGroup) return;
            rows.push(state.studentStates[`${t}:${sid}`] || { topic:t, sid, status:'OFFLINE', alertCount:0 });
        });
    });

    document.getElementById('stat-total').textContent = rows.length;
    document.getElementById('stat-alert').textContent = rows.filter(r=>r.status==='ALERT').length;
    document.getElementById('stat-sessions').textContent = state.topics.length;

    document.getElementById('student-tbody').innerHTML = rows.sort((a,b)=>a.sid.localeCompare(b.sid)).map(r => {
        const info = state.roster[r.sid] || { name: '---', group: '---' };
        return `<tr class="${r.status==='ALERT'?'alert-row':''}">
            <td><small>${info.group}</small></td><td><b>${r.sid}</b></td><td>${info.name}</td><td>${r.topic}</td>
            <td><span class="pill ${r.status}">${r.status}</span></td><td>${r.alertCount}</td></tr>`;
    }).join('');
  }

  function renderSessionManager() {
    document.getElementById('session-manager-list').innerHTML = state.topics.map(t => `
      <div class="card" style="display:flex; justify-content:space-between;">
        <div><b>${t}</b></div><button class="btn btn-red" onclick="deleteTopic('${t}')">削除</button></div>
    `).join('');
  }
  function deleteTopic(t) { if(confirm('削除?')){ state.topics=state.topics.filter(x=>x!==t); saveAndSync(); } }

</script>
</body>
</html>
