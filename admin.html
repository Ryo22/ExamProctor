<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>接続監視システム | 統合管理ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --green:   #22c55e;
      --red:     #ef4444;
      --blue:    #3b82f6;
      --orange:  #f97316;
    }
    body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; }

    #screen-login { align-items: center; justify-content: center; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px; text-align: center; }

    .btn { border: none; cursor: pointer; border-radius: 8px; font-weight: 700; transition: all 0.2s; font-family: inherit; }
    .btn:active { transform: scale(0.96); }
    .btn-blue  { background: var(--blue); color: #fff; padding: 12px; width: 100%; }
    .btn-green { background: var(--green); color: #000; padding: 12px; width: 100%; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; font-size: 0.75rem; }
    .btn-red   { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: var(--red); padding: 5px 10px; font-size: 0.75rem; }

    #screen-setup { align-items: center; padding: 3rem 1.5rem; }
    .setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 100%; max-width: 750px; }
    .topic-list { display: flex; flex-direction: column; gap: 10px; margin: 1.5rem 0; }
    .topic-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 15px; display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 15px; }

    .dash-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .top-scroll { background: var(--bg); padding: 1rem 1.5rem; overflow-x: auto; display: flex; gap: 1rem; border-bottom: 1px solid var(--border); }
    
    .exam-card { 
        min-width: 220px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; cursor: pointer; transition: all 0.2s;
    }
    .exam-card:hover { border-color: var(--blue); }
    .exam-card.active { border-color: var(--blue); background: rgba(59,130,246,0.1); }

    .dash-main { display: grid; grid-template-columns: 1fr 340px; gap: 1.5rem; padding: 1.5rem; max-width: 1400px; margin: 0 auto; width: 100%; }
    .card-v { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .card-v h2 { font-size: 0.85rem; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 1rem; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    td, th { padding: 12px 10px; border-bottom: 1px solid var(--border); text-align: left; }
    tr.row-alert { background: rgba(239, 68, 68, 0.05); }

    .status-pill { padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; }
    .status-pill.alert { background: var(--red); color: white; }
    .status-pill.focus-lost { background: var(--orange); color: white; }
    .status-pill.safe { background: rgba(34,197,94,0.15); color: var(--green); }
  </style>
</head>
<body>

<div id="screen-login" class="screen active">
  <div class="login-card">
    <div style="font-size: 3rem;">🔐</div>
    <h1>管理者パネル</h1>
    <div style="margin: 1.5rem 0;">
      <input type="password" id="pw-input" placeholder="パスワードを入力" style="width:100%; padding:10px; border-radius:8px; background:var(--bg); border:1px solid var(--border); color:white;"/>
    </div>
    <button class="btn btn-blue" onclick="checkPassword()">ログイン</button>
  </div>
</div>

<div id="screen-setup" class="screen">
  <div class="setup-card" style="margin: auto;">
    <h2>📅 試験セッション設定</h2>
    <div class="topic-list" id="topic-list-ui"></div>
    <div style="display: flex; gap: 10px;">
      <input type="text" id="new-topic-input" placeholder="セッションコード (例: math-session-1)" style="flex:1; background:var(--bg); border:1px solid var(--border); color:white; padding:10px; border-radius:8px;"/>
      <button class="btn btn-blue" style="width:auto; padding:0 20px;" onclick="addTopic()">追加</button>
    </div>
    <div style="margin-top: 1.5rem;">
      <label style="font-size:0.75rem; color:var(--muted); font-weight:800;">共通名簿 (学籍番号,氏名)</label>
      <textarea id="setup-roster" style="width:100%; height:100px; background:var(--bg); border:1px solid var(--border); color:white; padding:10px; border-radius:8px; margin-top:5px; font-family:monospace;" placeholder="2024001,田中太郎"></textarea>
    </div>
    <button class="btn btn-green" style="margin-top:1.5rem;" onclick="startDashboard()">監視を開始する</button>
  </div>
</div>

<div id="screen-dash" class="screen">
  <div class="dash-header">
    <div style="display:flex; align-items:center; gap:10px;">
      <h1>総合監視ダッシュボード</h1>
    </div>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-ghost" onclick="switchScreen('screen-setup')">⚙️ 設定</button>
      <button class="btn btn-ghost" onclick="location.reload()">再起動</button>
    </div>
  </div>

  <div class="top-scroll" id="exam-cards-container"></div>

  <div class="dash-main">
    <div class="dash-left">
      <div class="card-v">
        <h2>📊 検知トレンド</h2>
        <div style="height:180px;"><canvas id="alertChart"></canvas></div>
      </div>
      <div class="card-v">
        <h2>👥 受験生リスト <span id="filter-tag" style="font-size:0.7rem; color:var(--blue); margin-left:10px;"></span></h2>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr><th>試験</th><th>学籍番号</th><th>氏名</th><th>状態</th><th>検知数</th><th>操作</th></tr>
            </thead>
            <tbody id="main-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="dash-right">
      <div class="card-v">
        <h2>🚨 アラート</h2>
        <div class="alert-scroll" id="active-alerts-list" style="max-height: 400px; overflow-y: auto;"></div>
      </div>
      <div class="card-v">
        <h2>📝 監視ログ</h2>
        <div id="log-box" style="font-size:0.7rem; height:300px; overflow-y:auto; line-height:1.6;"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const NTFY_BASE = 'https://ntfy.sh';
  const POLL_INTERVAL = 3000;
  let activeTopics = [];
  let rosterData = {};
  let lastMessageIds = {};
  let studentStates = {};
  let filterTopic = null;
  let alertChart = null;

  function checkPassword() {
    if (document.getElementById('pw-input').value === 'admin') switchScreen('screen-setup');
  }

  function addTopic() {
    const t = document.getElementById('new-topic-input').value.trim();
    if (t && !activeTopics.includes(t)) {
        activeTopics.push(t);
        document.getElementById('new-topic-input').value = '';
        renderTopicList();
    }
  }

  function getClientUrl(t) {
    const u = new URL(location.href);
    // パスの最後を取得し、client.html に置き換え
    const basePath = u.pathname.substring(0, u.pathname.lastIndexOf('/') + 1);
    return `${u.origin}${basePath}client.html?topic=${encodeURIComponent(t)}`;
  }

  function renderTopicList() {
    document.getElementById('topic-list-ui').innerHTML = activeTopics.map(t => `
        <div class="topic-item">
            <div style="overflow:hidden;">
                <div style="font-weight:800; font-size:1.1rem; color:var(--blue);">${t}</div>
                <div style="font-size:0.65rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${getClientUrl(t)}</div>
            </div>
            <button class="btn btn-ghost" onclick="navigator.clipboard.writeText('${getClientUrl(t)}');alert('URLをコピーしました')">URLコピー</button>
            <button class="btn btn-red" onclick="activeTopics=activeTopics.filter(x=>x!=='${t}');renderTopicList()">削除</button>
        </div>
    `).join('');
  }

  function startDashboard() {
    if (activeTopics.length === 0) return;
    if (Notification.permission !== 'granted') Notification.requestPermission();
    
    document.getElementById('setup-roster').value.split('\n').forEach(line => {
      const p = line.split(/[,\t]/).map(s=>s.trim());
      if (p[0]) rosterData[p[0]] = p[1] || '';
    });
    switchScreen('screen-dash');
    initChart();
    activeTopics.forEach(t => lastMessageIds[t] = 'all');
    setInterval(pollAll, POLL_INTERVAL);
    pollAll();
  }

  async function pollAll() {
    await Promise.all(activeTopics.map(async topic => {
        try {
            const resp = await fetch(`${NTFY_BASE}/${topic}/json?poll=1&since=${lastMessageIds[topic]}`);
            if (!resp.ok) return;
            const text = await resp.text();
            text.trim().split('\n').filter(Boolean).forEach(line => {
                const msg = JSON.parse(line);
                if (msg.event === 'message') {
                    lastMessageIds[topic] = msg.id;
                    processMessage(topic, msg);
                }
            });
        } catch(e) {}
    }));
    updateUI();
  }

  function processMessage(topic, msg) {
    const parts = (msg.message || '').split(':');
    const type = parts[0], sid = parts[1], note = parts[2];
    if (!sid) return;

    const key = `${topic}:${sid}`;
    const ts = new Date(msg.time * 1000);
    if (!studentStates[key]) studentStates[key] = { topic, sid, status: 'safe', alertCount: 0, lastAlert: null };

    if (type === 'ALERT') {
        studentStates[key].status = 'alert';
        studentStates[key].alertCount++;
        studentStates[key].lastAlert = ts;
        notifyOS(`🚨 接続検知: ${sid}`, `${topic} で通信がありました`);
        addLog(topic, sid, 'ネット接続!!', ts);
    } else if (type === 'FOCUS_LOST') {
        studentStates[key].status = 'focus-lost';
        addLog(topic, sid, '画面切り替え（離脱）', ts);
    } else if (type === 'FOCUS_GAINED') {
        studentStates[key].status = 'safe';
        addLog(topic, sid, '画面復帰', ts);
    } else if (type === 'REGISTER') {
        studentStates[key].status = 'safe';
        addLog(topic, sid, '監視開始', ts);
    } else if (type === 'DISMISS') {
        studentStates[key].status = 'safe';
    }
  }

  function notifyOS(title, body) {
    if (Notification.permission === 'granted') new Notification(title, { body });
  }

  function updateUI() {
    const all = Object.values(studentStates);
    const filtered = filterTopic ? all.filter(s => s.topic === filterTopic) : all;

    // 試験カード
    let cards = `<div class="exam-card ${!filterTopic?'active':''}" onclick="filterTopic=null;updateUI()"><b>全体</b><br><small>${all.length}名 稼働中</small></div>`;
    activeTopics.forEach(t => {
        const count = all.filter(s=>s.topic===t).length;
        cards += `<div class="exam-card ${filterTopic===t?'active':''}" onclick="filterTopic='${t}';updateUI()">
            <div style="font-weight:800;">${t}</div>
            <small>${count}名</small>
            <button class="btn btn-red" style="width:100%; font-size:0.6rem; padding:4px; margin-top:8px;" onclick="event.stopPropagation();terminateExam('${t}')">一括終了</button>
        </div>`;
    });
    document.getElementById('exam-cards-container').innerHTML = cards;

    // テーブル
    document.getElementById('main-tbody').innerHTML = filtered.sort((a,b)=>a.sid.localeCompare(b.sid, undefined, {numeric:true})).map(s => `
        <tr class="${s.status==='alert'?'row-alert':''}">
            <td style="font-size:0.75rem; color:var(--muted);">${s.topic}</td>
            <td><b>${s.sid}</b></td>
            <td>${rosterData[s.sid] || '(未登録)'}</td>
            <td><span class="status-pill ${s.status}">${s.status.toUpperCase()}</span></td>
            <td>${s.alertCount}</td>
            <td><button class="btn btn-ghost" onclick="studentStates['${s.topic}:${s.sid}'].status='safe';updateUI()">解除</button></td>
        </tr>
    `).join('');

    // アラートリスト
    document.getElementById('active-alerts-list').innerHTML = all.filter(s=>s.status==='alert').map(s=>`
        <div style="background:rgba(239,68,68,0.1); border:1px solid var(--red); padding:10px; border-radius:8px; margin-bottom:10px;">
            <b>${s.sid}</b> (${s.topic})<br><small>${s.lastAlert.toLocaleTimeString()}</small>
        </div>
    `).join('');
  }

  async function terminateExam(topic) {
    if (confirm(`${topic} を終了させますか？\n全受験者の画面が終了メッセージに切り替わります。`)) {
        await fetch(`${NTFY_BASE}/${topic}`, { 
            method: 'POST', 
            body: 'FINISH_ALL_SIGNAL',
            headers: { 'X-Priority': '5' } 
        });
        alert(`${topic} に終了信号を送信しました。`);
    }
  }

  function initChart() {
    alertChart = new Chart(document.getElementById('alertChart'), { type:'line', data:{ labels:[], datasets:[{data:[],borderColor:'#ef4444',label:'検知',tension:0.4}] }, options:{responsive:true,maintainAspectRatio:false} });
  }

  function addLog(t, s, a, ts) {
    const log = document.getElementById('log-box');
    log.innerHTML = `<div><span style="color:var(--muted)">[${ts.toLocaleTimeString()}]</span> ${s} → ${a}</div>` + log.innerHTML;
  }

  function switchScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
</script>
</body>
</html>
