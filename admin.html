<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>接続監視システム | クラウド統合ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --green:   #22c55e;
      --red:     #ef4444;
      --blue:    #3b82f6;
      --orange:  #f97316;
    }
    body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    
    #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; text-align: center; }
    .login-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; margin-bottom: 1rem; }

    .app-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .nav-tabs { display: flex; gap: 5px; background: var(--bg); padding: 5px; border-radius: 10px; }
    .nav-tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700; color: var(--muted); }
    .nav-tab.active { background: var(--surface); color: var(--blue); }

    .app-viewport { flex: 1; overflow-y: auto; padding: 1.5rem; max-width: 1400px; margin: 0 auto; width: 100%; display: none; }
    .app-viewport.visible { display: block; }
    .page { display: none; }
    .page.active { display: block; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; text-align: center; }
    .stat-val { font-size: 1.8rem; font-weight: 900; line-height: 1; }
    
    .filter-scroll { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 1rem; padding-bottom: 10px; }
    .filter-chip { min-width: 120px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px; cursor: pointer; text-align: center; font-size: 0.85rem; font-weight: bold; color: var(--muted); transition: 0.15s; user-select: none; }
    .filter-chip.active { border-color: var(--blue); background: rgba(59,130,246,0.1); color: var(--blue); }
    .filter-all { order: -99; }

    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th { text-align: left; padding: 12px; color: var(--muted); border-bottom: 1px solid var(--border); text-transform: uppercase; font-size: 0.65rem; }
    td { padding: 12px; border-bottom: 1px solid var(--border); }
    tr.alert-row { background: rgba(239, 68, 68, 0.1); }
    tr.unknown-row { background: rgba(249, 115, 22, 0.05); }

    .btn { border: none; cursor: pointer; border-radius: 8px; font-weight: 700; padding: 8px 12px; transition: 0.2s; white-space: nowrap; }
    .btn-blue { background: var(--blue); color: white; }
    .btn-red { background: rgba(239,68,68,0.1); color: var(--red); }
    .btn-green { background: var(--green); color: black; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); font-size: 0.75rem; }
    
    input, textarea, select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; font-family: inherit; }
    input:focus, select:focus { border-color: var(--blue); outline:none; }
    .memo-input { background: transparent; border: none; border-bottom: 1px solid transparent; font-size: 0.75rem; padding: 4px; border-radius: 0; }
    .memo-input:focus { border-bottom-color: var(--muted); }

    .pill { padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 0.7rem; }
    .pill.SAFE { background: rgba(34,197,94,0.1); color: var(--green); }
    .pill.ALERT { background: rgba(239,68,68,0.1); color: var(--red); }
    .pill.FOCUS-LOST { background: rgba(249,115,22,0.1); color: var(--orange); }
    .pill.OFFLINE { background: var(--border); color: var(--muted); }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1 style="margin-bottom:1.5rem;">🛡️ クラウド管理者ログイン</h1>
    <input type="email" id="login-email" class="login-input" placeholder="メールアドレス" value="admin@example.com" />
    <input type="password" id="login-pass" class="login-input" placeholder="パスワード" value="password123" />
    <button class="btn btn-blue" style="width:100%; padding:14px;" onclick="handleLogin()">ログイン</button>
  </div>
</div>

<header class="app-header" style="display:none;">
    <div style="display:flex; align-items:center; gap:20px;">
        <h1 style="font-size:1.1rem; font-weight:900;">🛡️ Proctor Cloud</h1>
        <div class="nav-tabs">
            <div class="nav-tab active" data-tab="page-dash">ダッシュボード</div>
            <div class="nav-tab" data-tab="page-sessions">試験管理</div>
            <div class="nav-tab" data-tab="page-roster">名簿マスタ</div>
            <div class="nav-tab" data-tab="page-cloud">設定</div>
        </div>
    </div>
    <div id="cloud-sync-status" style="font-size:0.65rem; color:var(--muted); font-weight:bold;">● 同期中...</div>
</header>

<main class="app-viewport">
  <div id="page-dash" class="page active">
    <div class="stat-row">
        <div class="stat-box"><div class="stat-val" id="stat-total">0</div><div class="stat-lbl">監視対象</div></div>
        <div class="stat-box" style="color:var(--red);"><div class="stat-val" id="stat-alert">0</div><div class="stat-lbl">検知中</div></div>
        <div class="stat-box" style="color:var(--orange);"><div class="stat-val" id="stat-focus">0</div><div class="stat-lbl">離脱中</div></div>
        <div class="stat-box" style="color:var(--muted);"><div class="stat-val" id="stat-unknown">0</div><div class="stat-lbl">名簿外</div></div>
    </div>
    <div id="filter-section">
      <div class="filter-scroll" id="group-filter-container"></div>
      <div class="filter-scroll" id="topic-filter-container"></div>
    </div>
    <div class="card">
        <h2>受験生状況一覧</h2>
        <div style="overflow-x:auto;"><table><thead><tr><th>クラス</th><th>学籍番号</th><th>氏名</th><th>試験</th><th>状態</th><th>回数</th><th>操作</th><th>メモ</th></tr></thead><tbody id="student-tbody"></tbody></table></div>
    </div>
  </div>

  <div id="page-sessions" class="page">
    <div class="card">
      <h2>新規試験セッション追加</h2>
      <div style="display:flex; gap:10px;"><input type="text" id="new-topic-input" placeholder="セッション名"/><button class="btn btn-blue" onclick="addTopic()">追加</button></div>
    </div>
    <div id="session-manager-list"></div>
  </div>

  <div id="page-roster" class="page">
    <div class="card">
      <h2 id="roster-form-title">名簿登録・一括管理</h2>
      <!-- 共通エリア -->
      <div style="background:rgba(255,255,255,0.03); padding:1.2rem; border-radius:12px; margin-bottom:1.5rem; display:flex; gap:15px; align-items:flex-end;">
          <div style="flex:1;"><label style="font-size:0.7rem; color:var(--muted); margin-bottom:5px; display:block;">【共通】試験名：</label><select id="roster-topic-select"></select></div>
          <div style="flex:1;"><label style="font-size:0.7rem; color:var(--muted); margin-bottom:5px; display:block;">【共通】クラス：</label><input type="text" id="roster-group" placeholder="クラス名"/></div>
      </div>
      <!-- 個別エリア -->
      <div style="display:flex; gap:10px; margin-bottom:1rem; align-items:flex-end;">
          <div style="flex:1;"><label style="font-size:0.7rem; color:var(--muted); margin-bottom:5px; display:block;">学籍番号：</label><input type="text" id="roster-sid" placeholder="例: 2024001"/></div>
          <div style="flex:1;"><label style="font-size:0.7rem; color:var(--muted); margin-bottom:5px; display:block;">氏名：</label><input type="text" id="roster-name" placeholder="氏名"/></div>
          <button class="btn btn-blue" id="roster-save-btn" style="height:44px;" onclick="saveSingleRoster()">保存</button>
      </div>
      <div style="margin-top:2rem;">
          <label style="font-size:0.75rem; color:var(--muted); margin-bottom:8px; display:block;">一括追加（学籍番号, 氏名 の形式で貼り付け）</label>
          <textarea id="roster-bulk-input" rows="4" placeholder="2024001, 山田太郎&#10;2024002, 佐藤花子"></textarea>
          <button class="btn btn-green" style="margin-top:10px;" onclick="saveBulkRoster()">一括保存</button>
      </div>
    </div>
    <div class="card"><table><thead><tr><th>試験名</th><th>クラス</th><th>学籍番号</th><th>氏名</th><th>操作</th></tr></thead><tbody id="roster-tbody-master"></tbody></table></div>
  </div>

  <div id="page-cloud" class="page">
      <div class="card"><h2>🌩️ クラウド接続情報</h2><input type="text" id="sb-url" readonly style="margin-bottom:1rem;"/><button class="btn btn-ghost" onclick="syncNow()">手動同期</button></div>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://dkjftwhvhsxgcqawemmi.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRramZ0d2h2aHN4Z2NxYXdlbW1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4ODk5MzUsImV4cCI6MjA4OTQ2NTkzNX0.s4lYa3NRpM3ADs5esfVa_fpaAkVj4NLk7MKzgkSKsFo';
  let sb = null, POLL_INTERVAL = 3000;
  let state = { topics: [], roster: {}, studentStates: {}, memos: {}, lastIds: {} };

  function setStatus(msg, color) {
    const el = document.getElementById('cloud-sync-status');
    el.textContent = msg; el.style.color = color;
  }

  async function initCloud() {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    document.getElementById('sb-url').value = SUPABASE_URL;
    await pullFromCloud();
  }

  // --- クラウド読み込み（3テーブルから再構築）---
  async function pullFromCloud() {
    if (!sb) return;
    try {
      const [sessRes, studRes, statRes] = await Promise.all([
        sb.from('sessions').select('*'),
        sb.from('students').select('*'),
        sb.from('exam_status').select('*')
      ]);
      if (sessRes.error) throw sessRes.error;
      if (studRes.error) throw studRes.error;
      if (statRes.error) throw statRes.error;

      state.topics = (sessRes.data || []).map(s => s.topic_id);
      state.lastIds = {};
      (sessRes.data || []).forEach(s => { state.lastIds[s.topic_id] = s.last_ntfy_id || ''; });

      state.roster = {}; state.memos = {};
      (studRes.data || []).forEach(s => {
        state.roster[s.sid] = { name: s.name, group: s.class_group, topic: s.topic_id || '' };
        state.memos[s.sid] = s.memo || '';
      });

      state.studentStates = {};
      (statRes.data || []).forEach(s => {
        state.studentStates[`${s.topic_id}:${s.sid}`] = { topic: s.topic_id, sid: s.sid, status: s.status, count: s.alert_count };
      });

      renderAll();
      setStatus('● 同期済み ' + new Date().toLocaleTimeString(), 'var(--green)');
    } catch(e) {
      setStatus('✗ 読込失敗: ' + (e.message || e), 'var(--red)');
      console.error('pullFromCloud error:', e);
    }
  }

  function handleLogin() { if(document.getElementById('login-email').value==='admin@example.com' && document.getElementById('login-pass').value==='password123') { sessionStorage.setItem('admin_logged_in','true'); showAdminApp(); } }
  async function showAdminApp() {
    document.getElementById('login-screen').style.display='none';
    document.querySelector('.app-header').style.display='flex';
    document.querySelector('.app-viewport').classList.add('visible');
    await initCloud();
    setInterval(pollAll, POLL_INTERVAL);
    setInterval(pullFromCloud, 10000);
  }
  window.onload = () => { if(sessionStorage.getItem('admin_logged_in')==='true') showAdminApp(); };

  function switchTab(tabId) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabId));
    document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === tabId));
  }
  document.querySelectorAll('.nav-tab').forEach(t => t.onclick = () => switchTab(t.dataset.tab));

  function renderAll() { renderDashboard(); renderSessionManager(); renderRosterMaster(); }

  // --- 試験セッション ---
  async function addTopic() {
    const v = document.getElementById('new-topic-input').value.trim();
    if (!v || state.topics.includes(v)) return;
    const { error } = await sb.from('sessions').insert({ topic_id: v, last_ntfy_id: '' });
    if (error) { setStatus('✗ 保存失敗: ' + error.message, 'var(--red)'); return; }
    state.topics.push(v); state.lastIds[v] = '';
    document.getElementById('new-topic-input').value = '';
    renderAll(); setStatus('● 同期済み ' + new Date().toLocaleTimeString(), 'var(--green)');
  }

  function renderSessionManager() {
    const list = document.getElementById('session-manager-list');
    list.innerHTML = state.topics.sort().map(t => {
      const u = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1) + `client.html?topic=${encodeURIComponent(t)}`;
      return `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
        <div><b>${t}</b><div style="display:flex; gap:8px; margin-top:5px;"><input type="text" value="${u}" readonly style="font-size:0.65rem; width:250px;" id="u-${t}"/><button class="btn btn-ghost" onclick="const e=document.getElementById('u-${t}');e.select();document.execCommand('copy');alert('コピー完了');">コピー</button></div></div>
        <button class="btn btn-red" onclick="deleteTopic('${t}')">削除</button></div>`;
    }).join('');
    const sel = document.getElementById('roster-topic-select');
    const oldVal = sel.value;
    sel.innerHTML = state.topics.sort().map(t => `<option value="${t}">${t}</option>`).join('');
    if(oldVal && state.topics.includes(oldVal)) sel.value = oldVal;
  }

  async function deleteTopic(t) {
    if (!confirm('削除しますか？')) return;
    await sb.from('exam_status').delete().eq('topic_id', t);
    await sb.from('students').update({ topic_id: null }).eq('topic_id', t);
    const { error } = await sb.from('sessions').delete().eq('topic_id', t);
    if (error) { setStatus('✗ 削除失敗: ' + error.message, 'var(--red)'); return; }
    state.topics = state.topics.filter(x => x !== t);
    delete state.lastIds[t];
    Object.keys(state.studentStates).forEach(k => { if (k.startsWith(t + ':')) delete state.studentStates[k]; });
    Object.keys(state.roster).forEach(sid => { if (state.roster[sid].topic === t) state.roster[sid].topic = ''; });
    renderAll(); setStatus('● 同期済み ' + new Date().toLocaleTimeString(), 'var(--green)');
  }

  // --- ntfy.sh ポーリング ---
  async function pollAll() {
    const NTFY_BASE = 'https://ntfy.sh';
    for (const t of state.topics) {
      try {
        const r = await fetch(`${NTFY_BASE}/${t}/json?poll=1&since=${state.lastIds[t] || 'all'}`);
        if (!r.ok) continue;
        const text = await r.text();
        const upserts = [];
        text.trim().split('\n').filter(Boolean).forEach(line => {
          const m = JSON.parse(line);
          if (m.event === 'message') {
            state.lastIds[t] = m.id;
            const p = m.message.split(':'), type = p[0], sid = p[1];
            if (!sid) return;
            if (!state.studentStates[`${t}:${sid}`]) state.studentStates[`${t}:${sid}`] = { topic: t, sid, status: 'SAFE', count: 0 };
            const s = state.studentStates[`${t}:${sid}`];
            if (type === 'ALERT') { s.status = 'ALERT'; s.count++; }
            else if (type === 'FOCUS_LOST') s.status = 'FOCUS-LOST';
            else if (['REGISTER','FOCUS_GAINED','DISMISS'].includes(type)) s.status = 'SAFE';
            upserts.push({ topic_id: t, sid, status: s.status, alert_count: s.count, last_seen: new Date().toISOString() });
          }
        });
        if (upserts.length > 0) {
          await sb.from('exam_status').upsert(upserts, { onConflict: 'topic_id,sid' });
          await sb.from('sessions').update({ last_ntfy_id: state.lastIds[t] }).eq('topic_id', t);
        }
      } catch(e) {}
    }
    renderDashboard();
  }

  // --- ダッシュボード ---
  let fT = null, fG = null;
  function renderDashboard() {
    const rosterIds = Object.keys(state.roster);
    const groups = [...new Set(rosterIds.map(i => state.roster[i].group))].sort();
    document.getElementById('group-filter-container').innerHTML = `<div class="filter-chip filter-all ${fG===null?'active':''}" onclick="fG=null;renderDashboard()">全体表示</div>` + groups.map(g => `<div class="filter-chip ${fG===g?'active':''}" onclick="fG='${g}';renderDashboard()">${g}</div>`).join('');
    document.getElementById('topic-filter-container').innerHTML = `<div class="filter-chip filter-all ${fT===null?'active':''}" onclick="fT=null;renderDashboard()">全体表示</div>` + state.topics.map(t => `<div class="filter-chip ${fT===t?'active':''}" onclick="fT='${t}';renderDashboard()">${t}</div>`).join('');

    const allKeys = new Set(Object.keys(state.studentStates));
    state.topics.forEach(t => rosterIds.forEach(id => { if (state.roster[id].topic === t) allKeys.add(`${t}:${id}`); }));
    let rows = [], uk = 0;
    allKeys.forEach(key => {
      const [t, sid] = key.split(':'), r = state.roster[sid], s = state.studentStates[key] || { topic:t, sid, status:'OFFLINE', count:0 };
      if (fT!==null && t!==fT) return; if (fG!==null && (!r || r.group!==fG)) return;
      if (!r && s.status!=='OFFLINE') uk++;
      rows.push({ t, sid, name: r?r.name:'⚠️ 名簿未登録', group: r?r.group:'---', status: s.status, count: s.count, isUk: !r });
    });
    document.getElementById('stat-unknown').textContent = uk; document.getElementById('stat-total').textContent = rows.length;
    document.getElementById('stat-alert').textContent = rows.filter(r=>r.status==='ALERT').length;
    document.getElementById('stat-focus').textContent = rows.filter(r=>r.status==='FOCUS-LOST').length;

    document.getElementById('student-tbody').innerHTML = rows.sort((a,b)=>a.sid.localeCompare(b.sid)).map(r => `
      <tr class="${r.status==='ALERT'?'alert-row':''} ${r.isUk?'unknown-row':''}">
        <td><small>${r.group}</small></td><td><b>${r.sid}</b></td><td>${r.name}</td><td>${r.t}</td>
        <td><span class="pill ${r.status}">${r.status}</span></td><td>${r.count}</td>
        <td style="display:flex; gap:5px;"><button class="btn btn-ghost" onclick="dismissAlert('${r.t}','${r.sid}')">解除</button><button class="btn btn-ghost" style="color:var(--blue); border-color:var(--blue);" onclick="editRoster('${r.sid}')">編集</button></td>
        <td><input type="text" class="memo-input" value="${(state.memos[r.sid]||'').replace(/"/g,'&quot;')}" onblur="updateMemo('${r.sid}', this.value)" placeholder="メモ..."/></td>
      </tr>`).join('');
  }

  async function updateMemo(sid, v) {
    state.memos[sid] = v;
    const { error } = await sb.from('students').update({ memo: v }).eq('sid', sid);
    if (error) setStatus('✗ メモ保存失敗: ' + error.message, 'var(--red)');
    else setStatus('● 同期済み ' + new Date().toLocaleTimeString(), 'var(--green)');
  }

  async function dismissAlert(t, s) {
    if (!state.studentStates[`${t}:${s}`]) return;
    state.studentStates[`${t}:${s}`].status = 'SAFE';
    const { error } = await sb.from('exam_status').update({ status: 'SAFE' }).eq('topic_id', t).eq('sid', s);
    if (error) setStatus('✗ 更新失敗: ' + error.message, 'var(--red)');
    else setStatus('● 同期済み ' + new Date().toLocaleTimeString(), 'var(--green)');
    renderDashboard();
  }

  // --- 名簿 ---
  function editRoster(sid) {
    const info = state.roster[sid] || { group:'', name:'', topic:'' };
    document.getElementById('roster-group').value = info.group;
    document.getElementById('roster-sid').value = sid;
    document.getElementById('roster-name').value = info.name;
    if(info.topic) document.getElementById('roster-topic-select').value = info.topic;
    document.getElementById('roster-form-title').textContent = '名簿データの編集';
    document.getElementById('roster-save-btn').textContent = '更新';
    switchTab('page-roster'); document.getElementById('roster-group').focus();
  }

  async function saveSingleRoster() {
    const sid = document.getElementById('roster-sid').value.trim();
    const name = document.getElementById('roster-name').value.trim();
    const class_group = document.getElementById('roster-group').value.trim() || '---';
    const topic_id = document.getElementById('roster-topic-select').value;
    if (!sid || !name) return;
    const { error } = await sb.from('students').upsert({ sid, name, class_group, topic_id, memo: state.memos[sid] || '' });
    if (error) { setStatus('✗ 保存失敗: ' + error.message, 'var(--red)'); return; }
    state.roster[sid] = { name, group: class_group, topic: topic_id };
    document.getElementById('roster-sid').value = ''; document.getElementById('roster-name').value = '';
    renderAll(); setStatus('● 同期済み ' + new Date().toLocaleTimeString(), 'var(--green)');
  }

  async function saveBulkRoster() {
    const class_group = document.getElementById('roster-group').value.trim() || '---';
    const topic_id = document.getElementById('roster-topic-select').value;
    const lines = document.getElementById('roster-bulk-input').value.split('\n').filter(l => l);
    const records = [];
    lines.forEach(line => {
      const p = line.split(/[,\t\s]+/).filter(Boolean);
      if (p[0] && p[1]) {
        records.push({ sid: p[0], name: p[1], class_group, topic_id, memo: state.memos[p[0]] || '' });
        state.roster[p[0]] = { name: p[1], group: class_group, topic: topic_id };
      }
    });
    if (records.length === 0) return;
    const { error } = await sb.from('students').upsert(records);
    if (error) { setStatus('✗ 保存失敗: ' + error.message, 'var(--red)'); return; }
    document.getElementById('roster-bulk-input').value = '';
    renderAll(); setStatus('● 同期済み ' + new Date().toLocaleTimeString(), 'var(--green)');
  }

  function renderRosterMaster() {
    const entries = Object.entries(state.roster).sort((a,b)=>a[1].group.localeCompare(b[1].group) || a[0].localeCompare(b[0]));
    const ukSids = [...new Set(Object.keys(state.studentStates).map(k=>k.split(':')[1]).filter(sid => !state.roster[sid]))].sort();
    document.getElementById('roster-tbody-master').innerHTML = entries.map(([sid, info]) => `<tr><td>${info.topic||'---'}</td><td>${info.group}</td><td><b>${sid}</b></td><td>${info.name}</td><td><button class="btn btn-ghost" style="color:var(--blue); border-color:var(--blue);" onclick="editRoster('${sid}')">編集</button> <button class="btn btn-red" onclick="deleteRoster('${sid}')">削除</button></td></tr>`).join('') + ukSids.map(sid => `<tr class="unknown-row"><td>---</td><td>---</td><td><b>${sid}</b></td><td>⚠️ 未登録</td><td><button class="btn btn-blue" onclick="editRoster('${sid}')">登録</button></td></tr>`).join('');
  }

  async function deleteRoster(sid) {
    if (!confirm('削除しますか？')) return;
    await sb.from('exam_status').delete().eq('sid', sid);
    const { error } = await sb.from('students').delete().eq('sid', sid);
    if (error) { setStatus('✗ 削除失敗: ' + error.message, 'var(--red)'); return; }
    delete state.roster[sid]; delete state.memos[sid];
    renderAll(); setStatus('● 同期済み ' + new Date().toLocaleTimeString(), 'var(--green)');
  }

  function syncNow() { pullFromCloud(); }
</script>
</body>
</html>
